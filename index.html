<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TH Auto Repasse</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#0F0F0F;--surface:#1A1A1A;--border:#2A2A2A;--text:#F0EDE8;--muted:#6B6560;--sub:#9A948E;--gold:#C9A84C;--gold-light:#E2C97E;--gold-dark:#8B6914;--gold-dim:rgba(201,168,76,.14);--red:#EF4444;--red-dim:rgba(239,68,68,.12);--cyan:#4AADCA;--green:#4CAF7D;--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:20;transition:width .2s}
#sidebar.collapsed{width:0;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:20px}
.brand{padding:14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.brand-icon{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#0F0F0F;flex-shrink:0}
.brand-title{font-size:11px;font-weight:800;color:var(--gold)}
.brand-sub{font-size:9px;color:var(--sub)}
nav{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-sec{font-size:9px;color:var(--gold-dark);font-weight:700;text-transform:uppercase;padding:8px 10px 4px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--sub);cursor:pointer;font-size:12px;text-align:left;width:100%;border-left:2px solid transparent;white-space:nowrap}
.nav-btn:hover{background:rgba(201,168,76,.06);color:var(--text)}
.nav-btn.active{background:var(--gold-dim);color:var(--gold);font-weight:600;border-left-color:var(--gold)}
.badge{background:var(--red);color:#fff;border-radius:99px;font-size:9px;padding:1px 5px;font-weight:700;margin-left:auto}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.card-value{font-size:18px;font-weight:800}
.card-label{font-size:10px;color:var(--muted);margin-top:2px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 12px;text-align:left;color:var(--gold-dark);font-size:9px;font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(201,168,76,.03)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
label{font-size:10px;color:var(--gold-dark);font-weight:700;text-transform:uppercase}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;color:var(--text);font-size:12px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
select option{background:var(--surface)}
textarea{resize:vertical;min-height:60px}
.btn{padding:8px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0F0F0F}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-success{background:rgba(76,175,125,.15);color:#4CAF7D;border:1px solid rgba(76,175,125,.3)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{padding:5px 8px;background:rgba(255,255,255,.05);border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:13px;line-height:1}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;padding:14px}
.modal{background:var(--surface);border:1px solid var(--gold-dark);border-radius:14px;padding:22px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700;color:var(--gold)}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.sbadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap;display:inline-block}
.search-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap input{padding-left:30px}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.empty{padding:36px;text-align:center;color:var(--muted);font-size:13px}
.alert-yellow{padding:10px 14px;border-radius:9px;font-size:12px;margin-bottom:14px;background:rgba(201,168,76,.1);border:1px solid var(--gold);color:var(--gold-light)}
.sale-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.sale-card.overdue{border-color:var(--red)}
.sale-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.sale-meta{font-size:10px;color:var(--sub);margin-top:3px}
.sale-info-row{padding:8px 0;border-top:1px solid var(--border);display:flex;gap:14px;flex-wrap:wrap;font-size:11px}
.dre-row{display:flex;justify-content:space-between;padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:3px}
.dre-total{font-weight:800;font-size:14px;background:rgba(201,168,76,.06);border-radius:8px;border:1px solid rgba(201,168,76,.1)}
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.report-title{font-weight:700;font-size:14px;margin-bottom:14px;color:var(--gold)}
.tab-btn{padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-weight:600}
.tab-btn.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold)}
.msg-layout{display:flex;gap:12px;height:calc(100vh - 140px)}
.msg-list{width:230px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;flex-shrink:0;display:flex;flex-direction:column}
.msg-chat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;min-width:0}
.conv-item{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;border-left:2px solid transparent}
.conv-item.active{background:var(--gold-dim);border-left-color:var(--gold)}
.conv-name{font-weight:600;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.conv-preview{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:7px}
.msg-bubble{max-width:72%;padding:7px 11px;border-radius:11px;font-size:12px}
.msg-sent{align-self:flex-end;background:rgba(201,168,76,.2)}
.msg-recv{align-self:flex-start;background:var(--border)}
.msg-time{font-size:9px;color:var(--muted);margin-top:2px;text-align:right}
.chat-input{padding:10px;border-top:1px solid var(--border);display:flex;gap:7px}
#notif{position:fixed;bottom:18px;right:18px;padding:10px 16px;border-radius:9px;font-weight:600;font-size:12px;z-index:999;opacity:0;pointer-events:none;max-width:300px;transition:opacity .3s}
#notif.show{opacity:1}
#notif.ok{background:#5a4309;color:#fff;border:1px solid var(--gold)}
#notif.err{background:#7F1D1D;color:#FCA5A5;border:1px solid var(--red)}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:300}
.confirm-box{background:var(--surface);border:1px solid var(--red);border-radius:14px;padding:24px;max-width:360px;width:90%;text-align:center}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.cat-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.fin-entrada{color:#4CAF7D;font-weight:700}
.fin-saida{color:#EF4444;font-weight:700}
.mes-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
/* Pipeline Vendas */
.pipeline-wrap{display:flex;align-items:flex-start;gap:0;margin:10px 0 6px;overflow-x:auto;padding-bottom:2px}
.pip-step{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:68px}
.pip-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid;flex-shrink:0;transition:all .2s}
.pip-dot.pip-done{opacity:.55}
.pip-dot.pip-current{box-shadow:0 0 10px rgba(255,255,255,.25)}
.pip-dot.pip-pending{opacity:.2;background:transparent!important}
.pip-label{font-size:9px;text-align:center;line-height:1.2;max-width:64px;font-weight:600}
.pip-date{font-size:8px;color:var(--muted);text-align:center}
.pip-arrow{font-size:11px;color:#333;margin:0 1px;padding-top:6px;flex-shrink:0}
.pip-prazo{font-size:8px;font-weight:700;text-align:center}
.sale-card.pip-overdue{border-color:var(--red)!important;box-shadow:0 0 14px rgba(239,68,68,.2)}
.btn-pip{padding:5px 11px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-weight:700;font-size:11px;display:inline-flex;align-items:center;gap:4px;transition:opacity .15s}
.btn-pip:hover{opacity:.85}
@media(max-width:620px){#sidebar{position:fixed;height:100vh}.form-grid{grid-template-columns:1fr}.card-grid{grid-template-columns:repeat(2,1fr)}.msg-layout{flex-direction:column;height:auto}.msg-list{width:100%;height:180px}.msg-chat{height:400px}}
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:380px;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .logo-icon{width:64px;height:64px;border-radius:14px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#0a0f1e;margin:0 auto 12px}
.login-logo h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
.login-logo p{font-size:12px;color:var(--muted);margin:4px 0 0}
.login-field{margin-bottom:16px}
.login-field label{display:block;font-size:12px;font-weight:600;color:var(--sub);margin-bottom:6px}
.login-field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-size:14px;outline:none;box-sizing:border-box;transition:border-color .2s}
.login-field input:focus{border-color:var(--gold)}
.login-btn{width:100%;background:var(--gold);border:none;border-radius:var(--radius-sm);padding:12px;color:#0a0f1e;font-weight:700;font-size:15px;cursor:pointer;margin-top:8px;transition:opacity .2s}
.login-btn:hover{opacity:.85}
.login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:#FCA5A5;margin-top:12px;display:none;text-align:center}
</style>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-icon">TH</div>
      <h1>TH Auto Repasse</h1>
      <p>Sistema de Gestao Financeira</p>
    </div>
    <div class="login-field">
      <label>Usuario</label>
      <input type="text" id="loginUser" placeholder="Digite seu usuario" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="Digite sua senha" onkeydown="if(event.key==='Enter')fazerLogin()">
    </div>
    <button class="login-btn" onclick="fazerLogin()">Entrar</button>
    <div class="login-error" id="loginError">Usuario ou senha incorretos</div>
    <div style="text-align:center;margin-top:16px">
      <button onclick="esqueciSenha()" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:12px;text-decoration:underline">Esqueci minha senha</button>
    </div>
  </div>
</div>
<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-icon">TH</div>
      <div>
        <div class="brand-title">TH AUTO REPASSE</div>
        <div class="brand-sub" id="syncStatus">Conectando...</div>
      </div>
    </div>
    <nav id="nav"></nav>
  </aside>
  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px">&#9776;</button>
        <span id="pageTitle" style="font-weight:700;font-size:15px;color:var(--gold)"></span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="todayDate" style="font-size:11px;color:var(--muted)"></span>
        <div style="display:flex;align-items:center;gap:6px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:4px 12px">
          <span style="font-size:11px;color:var(--gold)">&#128100;</span>
          <span id="userLabel" style="font-size:12px;font-weight:600;color:var(--gold)"></span>
          <button onclick="fazerLogout()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0;margin-left:4px" title="Sair">&#128275;</button>
        </div>
      </div>
    </div>
    <div id="content">
      <div id="loadingScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--muted)">
        <div class="spinner"></div><span>Conectando...</span>
      </div>
    </div>
  </div>
</div>
<div id="notif"></div>

<script>
var USUARIOS={'admin':'th2026','financeiro':'th2026','rafael':'rafael123','euber':'euber123','th':'thauto2026'};
var usuarioLogado=null;
function fazerLogin(){
  var user=(document.getElementById('loginUser').value||'').trim().toLowerCase();
  var pass=document.getElementById('loginPass').value||'';
  var err=document.getElementById('loginError');
  if(USUARIOS[user]&&USUARIOS[user]===pass){
    usuarioLogado=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='flex';
    var el=document.getElementById('userLabel');
    if(el)el.textContent=user.charAt(0).toUpperCase()+user.slice(1);
    err.style.display='none';
  }else{err.style.display='block';document.getElementById('loginPass').value='';document.getElementById('loginPass').focus();}
}
function esqueciSenha(){
  var user=(document.getElementById('loginUser').value||'').trim().toLowerCase();
  // Numero do admin para contato (configuravel)
  var adminWhats='5562999999999'; // trocar pelo numero real
  try{var cfg=localStorage.getItem('th_config');if(cfg){var c=JSON.parse(cfg);if(c.adminWhats)adminWhats=c.adminWhats;}}catch(e){}
  var msg=encodeURIComponent('Ola! Preciso resetar a senha do usuario: '+(user||'[informe seu usuario]')+' no sistema TH Auto Repasse.');
  var url='https://wa.me/'+adminWhats+'?text='+msg;
  window.open(url,'_blank');
}
function fazerLogout(){
  usuarioLogado=null;
  document.getElementById('app').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';
}
function salvarUsuarios(){try{localStorage.setItem('th_usuarios',JSON.stringify(USUARIOS));}catch(e){}}
function carregarUsuarios(){try{var s=localStorage.getItem('th_usuarios');if(s){var o=JSON.parse(s);Object.keys(o).forEach(function(u){USUARIOS[u]=o[u];});}}catch(e){}}
carregarUsuarios();
carregarPermissoes();
// Sempre pede senha ao abrir o sistema
// Categorias do financeiro - editaveis pelo usuario
var CATS_FIN = ['Venda','Compra Veiculo','Comissao','Despesa','Custo Fixo','Retirada de Socio','Transferencia','Aplicacao CDB','Imposto','Contabilidade','Documentacao','Outros'];
function carregarCatsFin(){try{var s=localStorage.getItem('th_cats_fin');if(s)CATS_FIN=JSON.parse(s);}catch(e){}}
function salvarCatsFin(){try{localStorage.setItem('th_cats_fin',JSON.stringify(CATS_FIN));}catch(e){}}
carregarCatsFin();
var db = null;
var clients=[], sales=[], messages=[], expenses=[], categories=[], financeiro=[], parceiros=[], chamados=[];
var loadedCount=0;
var currentTab='dashboard', selectedConv=null, repTab='geral', repMonth='', dreMonth=null, finTab='lancamentos';
var modalSaveFn=null;

var STATUS_MAP={
  aguardando_boleto:{label:'Aguard. Boleto',color:'#94a3b8'},
  boleto_enviado:{label:'Boleto Enviado',color:'#f59e0b'},
  boleto_pago:{label:'Boleto Pago',color:'#10b981'},
  aguardando_liberacao:{label:'Aguard. Liberacao',color:'#4A90D9'},
  carro_liberado:{label:'Carro Liberado',color:'#8b5cf6'},
  cancelada:{label:'Cancelada',color:'#EF4444'}
};
// Ordem das etapas do pipeline
var PIPELINE=['aguardando_boleto','boleto_enviado','boleto_pago','aguardando_liberacao','carro_liberado'];
// Prazos em dias por etapa
var PRAZOS={aguardando_boleto:1,boleto_enviado:2,boleto_pago:1,aguardando_liberacao:3,carro_liberado:null};
// Etapas que contam no financeiro (a partir de boleto_pago)
var ETAPAS_FINANCEIRO=['boleto_pago','aguardando_liberacao','carro_liberado'];
// Categorias do financeiro que NAO entram no DRE (ja contabilizadas nas vendas)
var CATS_DRE_EXCLUIR=['venda','compra veiculo','compra','transferencia','retirada de socio','retirada socio','retirada'];
function finDRE(f){var cat=(f.categoria||f.descricao||'').toLowerCase().trim();return CATS_DRE_EXCLUIR.indexOf(cat)<0;}
var BR_STATES=['AC','AL','AP','AM','BA','CE','DF','ES','GO','MA','MT','MS','MG','PA','PB','PR','PE','PI','RJ','RN','RS','RO','RR','SC','SP','SE','TO'];

function liberarApp(){
  document.getElementById('syncStatus').textContent='Online';
  var ls=document.getElementById('loadingScreen');
  if(ls)ls.style.display='none';
  limparLancamentosAutomaticos();
  migrarVendasAntigas();
  goTo('dashboard');
}
function onLoaded(){
  loadedCount++;
  if(loadedCount>=7){
    clearTimeout(window._connectTimeout);
    liberarApp();
  }
}
function initFirebase(){
  try{
    firebase.initializeApp({
      apiKey:"AIzaSyBHcpM_BMzo6y98HvlFXwhAwV4Ot5-1gm8",
      authDomain:"th-auto-repasse.firebaseapp.com",
      projectId:"th-auto-repasse",
      storageBucket:"th-auto-repasse.firebasestorage.app",
      messagingSenderId:"227004517822",
      appId:"1:227004517822:web:132ea3f2c140ccfc85bdef"
    });
  }catch(e){console.log('Firebase ja iniciado');}
  db=firebase.firestore();

  // Timeout de seguranca: 6s sem conectar -> libera mesmo assim
  window._connectTimeout=setTimeout(function(){
    console.warn('Timeout Firebase: '+loadedCount+'/6 colecoes carregadas');
    document.getElementById('syncStatus').textContent=(loadedCount>0?'Parcial':'Offline');
    var ls=document.getElementById('loadingScreen');
    if(ls)ls.style.display='none';
    goTo('dashboard');
  },6000);

  function snap(col,cb){
    db.collection(col).onSnapshot(
      function(s){cb(s);},
      function(e){console.error('Erro '+col+':',e.message);onLoaded();}
    );
  }
  snap('clients',  function(s){clients=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});onLoaded();if(currentTab==='clients')render();buildNav();});

// Migra vendas antigas (sem historico ou com status do sistema antigo) para o novo pipeline
var STATUS_LEGADO={'aguardando_pagamento':'aguardando_boleto','pagamento_confirmado':'carro_liberado','em_processo':'aguardando_liberacao','liberado':'carro_liberado','concluida':'carro_liberado'};
function limparLancamentosAutomaticos(){
  // Deleta lancamentos gerados automaticamente pelo sistema antigo
  db.collection('financeiro').where('obs','==','Gerado automaticamente ao marcar boleto como pago').get().then(function(snap){
    if(snap.empty)return;
    snap.forEach(function(d){d.ref.delete();});
    console.log('Removidos '+snap.size+' lancamentos automaticos do financeiro');
  }).catch(function(){});
}
function migrarVendasAntigas(){
  sales.forEach(function(s){
    var precisaMigrar=false;
    var novoStatus=s.status;
    // Corrigir status legado
    if(STATUS_LEGADO[s.status]){novoStatus=STATUS_LEGADO[s.status];precisaMigrar=true;}
    // Status nao reconhecido -> marcar como carro_liberado
    if(!STATUS_MAP[s.status]&&s.status!=='cancelada'){novoStatus='carro_liberado';precisaMigrar=true;}
    // Sem historico -> criar
    if(!s.historico||typeof s.historico!=='object'){precisaMigrar=true;}
    if(!precisaMigrar)return;
    var hist=(s.historico&&typeof s.historico==='object')?Object.assign({},s.historico):{};
    if(!hist[novoStatus])hist[novoStatus]=new Date(s.createdAt||Date.now()).toISOString();
    db.collection('sales').doc(s.id).update({status:novoStatus,historico:hist}).catch(function(){});
  });
}

  [{key:'documentacao',label:'Documentacao'},{key:'preparacao',label:'Preparacao/Mecanica'},{key:'marketing',label:'Marketing'},{key:'fixo',label:'Custo Fixo'},{key:'comissao',label:'Comissao'},{key:'retirada de socio',label:'Retirada de Socio'},{key:'transferencia',label:'Transferencia'},{key:'outros',label:'Outros'}].forEach(function(c){db.collection('categories').add(c);});

function today(){return new Date().toISOString().split('T')[0];}
function fmtCur(v){return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});}
function fmtDate(d){if(!d)return '-';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function addDays(d,n){if(!d)return null;var dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}
function daysLeft(d){if(!d)return null;return Math.ceil((new Date(d+'T12:00:00')-new Date())/86400000);}

function prazoHtml(date,label){
  var d=daysLeft(date);

  return '<span style="font-size:10px;font-weight:600;color:'+color+'">'+(label?label+': ':'')+text+' ('+fmtDate(date)+')</span>';

// CALC HELPERS
function getAllMonths(){
  var all=[];
  sales.forEach(function(s){var m=monthKey(s.saleDate||s.createdAt);if(m&&all.indexOf(m)<0)all.push(m);});
  expenses.forEach(function(e){var m=monthKey(e.date);if(m&&all.indexOf(m)<0)all.push(m);});
  financeiro.forEach(function(f){var m=monthKey(f.date);if(m&&all.indexOf(m)<0)all.push(m);});
  return all.sort();
}
function calcMonth(m){
  // Usa EXATAMENTE a mesma logica do calcDRE para consistencia
  var d=calcDRE(m);
  // Saldo de caixa do mes (todas as movimentacoes do financeiro)
  var mF=financeiro.filter(function(f){return monthKey(f.date)===m;});
  var cxEnt=mF.filter(function(f){return f.tipo==='entrada';}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var cxSai=mF.filter(function(f){return f.tipo==='saida';}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  return {
    receita:d.receita, cmv:d.cmv, custosExtras:d.custosExtras,
    gastos:d.despOper, comissoes:d.comissoes, despFin:d.despFin,
    lucroBruto:d.lucBrt, lucroLiquido:d.lucLiq,
    lucro:d.lucLiq, // resultado = lucro liquido (igual ao DRE)
    entradas:d.finEnt, saidas:d.finSai,
    cxEnt:cxEnt, cxSai:cxSai, cxMes:cxEnt-cxSai,
    qtd:d.done.length, pendente:d.pending.length, aReceber:d.aReceber
  };
}

// ── SALES ────────────────────────────────
function diasNaEtapa(s){
  var hist=s.historico||{};
  var entrada=hist[s.status];
  if(!entrada)return 0;
  return Math.floor((Date.now()-new Date(entrada).getTime())/86400000);
}
function pipOverdue(s){
  if(s.status==='carro_liberado'||s.status==='cancelada')return false;
  var prazo=PRAZOS[s.status];
  if(!prazo)return false;
  return diasNaEtapa(s)>prazo;
}
function buildPipelineHtml(s){
  var hist=s.historico||{};
  var idxAtual=PIPELINE.indexOf(s.status);
  var h='<div class="pipeline-wrap">';
  PIPELINE.forEach(function(etId,i){
    var et=STATUS_MAP[etId];
    var feita=i<idxAtual;
    var atual=i===idxAtual;
    var pendente=i>idxAtual;
    var cls=feita?'pip-done':atual?'pip-current':'pip-pending';
    var ico=feita?'✓':atual?['⏳','📄','✅','🔓','🚗'][i]:'·';
    var prazo=PRAZOS[etId];
    var dias=atual?diasNaEtapa(s):null;
    var atrasado=atual&&prazo&&dias>prazo;
    var prazoTxt=atual&&prazo?(atrasado?'<span style="color:#EF4444">+'+dias+'d/'+prazo+'d</span>':'<span style="color:var(--sub)">'+dias+'d/'+prazo+'d</span>'):'';
    var dataEnt=hist[etId]?new Date(hist[etId]).toLocaleDateString('pt-BR'):'';
    h+='<div class="pip-step">';
    h+='<div class="pip-dot '+cls+'" style="color:'+et.color+';border-color:'+et.color+';background:'+et.color+(feita?'44':atual?'22':'11')+'">'+ico+'</div>';
    h+='<div class="pip-label" style="color:'+(atual?et.color:feita?'var(--sub)':'var(--muted)')+'">'+et.label+'</div>';
    if(dataEnt)h+='<div class="pip-date">'+dataEnt+'</div>';
    if(prazoTxt)h+='<div class="pip-prazo">'+prazoTxt+'</div>';
    h+='</div>';
    if(i<PIPELINE.length-1)h+='<div class="pip-arrow">›</div>';
  });
  h+='</div>';
  return h;
}

    var mesOk=(fm==='todos'||monthKey(s.saleDate||s.createdAt)===fm);
    return textoOk&&statusOk&&mesOk;
  });
  // ordenar: atrasadas primeiro, depois por etapa
  f.sort(function(a,b){var oa=pipOverdue(a)?0:1,ob=pipOverdue(b)?0:1;if(oa!==ob)return oa-ob;return PIPELINE.indexOf(a.status)-PIPELINE.indexOf(b.status);});
  if(!f.length)return '<div class="empty">Nenhuma venda</div>';
  return f.map(function(s){
    var cl=getClient(s.clientId);
    var overdue=pipOverdue(s);
    var sExp=expenses.filter(function(e){return e.plate===s.plate;}).reduce(function(a,e){return a+Number(e.value||0);},0);
    var custosExtras=Number(s.channelValue||0)+Number(s.despachante||0)+Number(s.transferencia||0)+Number(s.multas||0)+Number(s.vistoria||0)+Number(s.comissao||0)+Number(s.frete||0)+Number(s.txCanal||0)+Number(s.outros||0);
    var finPlaca=s.plate?financeiro.filter(function(f){return f.tipo==="saida"&&(f.plate||"").toUpperCase()===(s.plate||"").toUpperCase()&&!f.autoCusto;}).reduce(function(a,f){return a+Number(f.valor||0);},0):0;
    var lucro=Number(s.value||0)-Number(s.cost||0)-custosExtras-sExp-finPlaca;
    var idxAtual=PIPELINE.indexOf(s.status);
    var noFin=ETAPAS_FINANCEIRO.indexOf(s.status)>=0;

    // Botoes de avancar/voltar pipeline
    var btns='';

      if(idxAtual<PIPELINE.length-1){
        var proxEt=STATUS_MAP[PIPELINE[idxAtual+1]];

      }
      if(idxAtual>0){
        btns+='<button class="btn-pip" style="background:rgba(255,255,255,.05);color:var(--sub);border:1px solid var(--border)" onclick="voltarEtapa(\''+s.id+'\')">← Voltar</button>';
      }
    }
    btns+='<button class="btn btn-secondary btn-sm" onclick="openSaleModal(\''+s.id+'\')">Editar</button>';
    btns+='<button class="btn btn-danger btn-sm" onclick="deleteSale(\''+s.id+'\')">Excluir</button>';
    if(cl.phone)btns+='<a href="https://wa.me/55'+((cl.phone||'').replace(/\D/g,''))+'" target="_blank"><button class="btn btn-sm" style="background:rgba(37,211,102,.15);color:#25D366;border:1px solid rgba(37,211,102,.3)">WhatsApp</button></a>';

    return '<div class="sale-card '+(overdue?'pip-overdue':'')+'" style="border-left:3px solid '+(STATUS_MAP[s.status]||{color:'var(--border)'}).color+'">'+
      '<div class="sale-top"><div style="flex:1">'+
      '<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">'+

      (noFin?'<span class="sbadge" style="background:rgba(76,175,125,.12);color:#4CAF7D;border:1px solid rgba(76,175,125,.3)">💰 No Financeiro</span>':

      '</div>'+
      '<div class="sale-meta">'+(cl.name||'-')+' | '+fmtDate(s.saleDate||s.createdAt)+' | '+(s.km?Number(s.km).toLocaleString('pt-BR')+' km':'-')+'</div>'+
      (s.notes?'<div class="sale-meta">📝 '+s.notes+'</div>':'')+

}
function avancarEtapa(id){
  var s=sales.find(function(x){return x.id===id;});if(!s)return;
  var idx=PIPELINE.indexOf(s.status);
  if(idx<0||idx>=PIPELINE.length-1)return;
  var novaEtapa=PIPELINE[idx+1];
  // Usar dot notation para o Firestore aceitar campo aninhado
  var histKey='historico.'+novaEtapa;
  var upd={status:novaEtapa};
  upd[histKey]=new Date().toISOString();
  // Lançamento financeiro é feito manualmente - nao criar automatico
  db.collection('sales').doc(id).update(upd).then(function(){notify('Avancado para: '+(STATUS_MAP[novaEtapa]||{label:novaEtapa}).label);}).catch(function(e){notify('Erro: '+e.message,'err');});
}
function voltarEtapa(id){
  var s=sales.find(function(x){return x.id===id;});if(!s)return;
  var idx=PIPELINE.indexOf(s.status);
  if(idx<=0)return;
  var etapaAnterior=PIPELINE[idx-1];
  var upd={status:etapaAnterior};
  upd['historico.'+s.status]=firebase.firestore.FieldValue.delete();
  // Sem lancamento automatico para remover
  db.collection('sales').doc(id).update(upd).then(function(){notify('Voltado para: '+(STATUS_MAP[etapaAnterior]||{label:etapaAnterior}).label);}).catch(function(e){notify('Erro: '+e.message,'err');});
}
function openSaleModal(id){
  var s=id?(sales.find(function(x){return x.id===id;})||{}):{status:'aguardando_boleto',saleDate:today()};
  if(!s.historico)s.historico={};
  if(!s.status||!STATUS_MAP[s.status])s.status='aguardando_boleto';
  if(!s.historico[s.status])s.historico[s.status]=new Date().toISOString();
  var co=clients.map(function(c){return '<option value="'+c.id+'"'+(s.clientId===c.id?' selected':'')+'>'+c.name+'</option>';}).join('');

function syncCustosVendaFinanceiro(saleId, plate, vehicle, data, saleDate){
  // Campos de custo da venda e suas categorias no financeiro
  var campos=[
    {campo:'channelValue', cat:'Compra Veiculo', label:'Canal'},
    {campo:'despachante',  cat:'Documentacao',   label:'Despachante'},
    {campo:'transferencia',cat:'Documentacao',   label:'Transferencia'},
    {campo:'multas',       cat:'Documentacao',   label:'Multas'},
    {campo:'vistoria',     cat:'Documentacao',   label:'Vistoria'},
    {campo:'comissao',     cat:'Comissao',       label:'Comissao'},
    {campo:'frete',        cat:'Despesa',        label:'Frete'},
    {campo:'txCanal',      cat:'Despesa',        label:'Tx Canal'},
    {campo:'outros',       cat:'Outros',         label:'Outros'},
  ];
  // Buscar lancamentos automaticos existentes para essa venda
  db.collection('financeiro').where('saleId','==',saleId).where('autoCusto','==',true).get().then(function(snap){
    // Deletar todos os automaticos antigos
    snap.forEach(function(d){d.ref.delete();});
    // Criar novos para cada campo com valor > 0
    campos.forEach(function(c){
      var valor=Number(data[c.campo]||0);
      if(valor<=0)return;
      db.collection('financeiro').add({
        descricao:c.label+' - '+(vehicle||'')+(plate?' ['+plate+']':''),
        valor:valor,
        date:saleDate||today(),
        tipo:'saida',
        categoria:c.cat,
        plate:plate||'',
        saleId:saleId,
        autoCusto:true,
        obs:'Gerado automaticamente pela venda'
      }).catch(function(){});
    });
  }).catch(function(){});
}
function saveSale(id){
  var vehicle=gv('sv_v').trim(),value=gv('sv_val');
  if(!vehicle||!value){notify('Preencha veiculo e valor','err');return;}
  var plate=gv('sv_pl').toUpperCase();
  var saleDate=gv('sv_sd')||today();
  var data={clientId:gv('sv_cli')||null,vehicle:vehicle,year:parseInt(gv('sv_y'))||'',plate:plate,km:gv('sv_km'),value:Number(value),cost:gn('sv_cost'),channelValue:gn('sv_ch'),despachante:gn('sv_desp'),transferencia:gn('sv_transf'),multas:gn('sv_mult'),vistoria:gn('sv_vist'),comissao:gn('sv_com'),frete:gn('sv_frete'),txCanal:gn('sv_txcanal'),outros:gn('sv_outros'),status:gv('sv_st'),saleDate:saleDate,paymentDate:gv('sv_pd')||null,releaseDate:gv('sv_rd')||null,notes:gv('sv_n')};
  if(id){
    db.collection('sales').doc(id).update(data).then(function(){
      syncCustosVendaFinanceiro(id,plate,vehicle,data,saleDate);
      notify('Atualizada!');closeModal();
    }).catch(function(e){notify('Erro: '+e.message,'err');});
  } else {
    data.createdAt=today();data.docsSent=false;data.docsReceived=false;
    var hist={};hist[data.status]=new Date().toISOString();data.historico=hist;
    db.collection('sales').add(data).then(function(ref){
      syncCustosVendaFinanceiro(ref.id,plate,vehicle,data,saleDate);
      notify('Registrada!');closeModal();
    }).catch(function(e){notify('Erro: '+e.message,'err');});
  }
}
function deleteSale(id){confirmDlg('Excluir Venda','Tem certeza?',function(){db.collection('sales').doc(id).delete().then(function(){notify('Removida','err');}).catch(function(e){notify('Erro: '+e.message,'err');});});}
function zerarCustosExtrasVendas(){
  confirmDlg('Zerar Custos Extras','Isso vai zerar despachante, transferencia, multas, vistoria, comissao, frete, txCanal e outros de TODAS as vendas. Confirma?',function(){
    var total=sales.length,feitos=0;
    if(!total){notify('Nenhuma venda','err');return;}
    var zeros={channelValue:0,despachante:0,transferencia:0,multas:0,vistoria:0,comissao:0,frete:0,txCanal:0,outros:0};
    sales.forEach(function(s){
      db.collection('sales').doc(s.id).update(zeros).then(function(){
        feitos++;
        if(feitos===total)notify('Pronto! '+total+' vendas atualizadas!');
      }).catch(function(){feitos++;});
    });
  });
}

function saveExpense(id){
  var desc=gv('eg_d').trim(),value=gv('eg_v'),date=gv('eg_dt');
  if(!desc||!value||!date){notify('Preencha descricao, valor e data','err');return;}
  var data={desc:desc,value:Number(value),category:gv('eg_c'),date:date,plate:gv('eg_p'),notes:gv('eg_n')};
  if(id){
    // atualiza gasto
    db.collection('expenses').doc(id).update(data).then(function(){
      // atualiza lancamento financeiro vinculado se existir
      db.collection('financeiro').where('expenseId','==',id).get().then(function(snap){
        snap.forEach(function(doc){
          db.collection('financeiro').doc(doc.id).update({
            descricao:desc,valor:Number(value),date:date,plate:gv('eg_p'),categoria:getCatLabel(gv('eg_c'))
          });
        });
      });
      notify('Gasto atualizado!');closeModal();
    }).catch(function(e){notify('Erro: '+e.message,'err');});
  }else{
    db.collection('expenses').add(data).then(function(ref){
      // cria automaticamente saida no financeiro
      db.collection('financeiro').add({
        tipo:'saida',
        descricao:desc,
        valor:Number(value),
        date:date,
        plate:gv('eg_p'),
        categoria:getCatLabel(gv('eg_c')),
        obs:'Lancado automaticamente via Gastos',
        expenseId:ref.id
      });
      notify('Gasto registrado e lancado no Financeiro!');closeModal();
    }).catch(function(e){notify('Erro: '+e.message,'err');});
  }
}
function deleteExpense(id){
  confirmDlg('Excluir Gasto','Isso tambem remove o lancamento no Financeiro. Tem certeza?',function(){
    db.collection('expenses').doc(id).delete().then(function(){
      // remove lancamento financeiro vinculado
      db.collection('financeiro').where('expenseId','==',id).get().then(function(snap){
        snap.forEach(function(doc){db.collection('financeiro').doc(doc.id).delete();});
      });
      notify('Gasto e lancamento removidos','err');
    }).catch(function(e){notify('Erro: '+e.message,'err');});
  });
}

function lerCSV(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;
    processarCSV(text);
  };
  reader.readAsText(file,'UTF-8');
}

function processarCSV(text){
  text=text.replace(/^\uFEFF/,'');
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2){
    document.getElementById('importPreviewArea').innerHTML='<div style="color:var(--red);padding:10px;background:rgba(239,68,68,.1);border-radius:8px">Arquivo vazio ou invalido.</div>';
    return;
  }
  function parseCSVLine(line){
    var cols=[],cur='',inQuote=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(ch==='"'){inQuote=!inQuote;}
      else if((ch===','||ch===';')&&!inQuote){cols.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    cols.push(cur.trim());
    return cols;
  }
  // normaliza texto removendo acentos e caracteres especiais
  function norm(s){
    return (s||'').toString().toLowerCase()
      .replace(/[àáâãäå]/g,'a').replace(/[èéêë]/g,'e')
      .replace(/[ìíîï]/g,'i').replace(/[òóôõö]/g,'o')
      .replace(/[ùúûü]/g,'u').replace(/[ç]/g,'c')
      .replace(/[ñ]/g,'n').replace(/[^a-z0-9 ]/g,' ').trim();
  }
  var headers=parseCSVLine(lines[0]).map(function(h){return h.replace(/"/g,'').trim();});
  var headersNorm=headers.map(function(h){return norm(h);});
  var rows=[];
  for(var i=1;i<lines.length;i++){
    var cols=parseCSVLine(lines[i]);
    if(cols.join('').trim()==='') continue;
    var obj={};
    headers.forEach(function(h,idx){
      obj[h]=(cols[idx]||'').replace(/"/g,'').trim();
      obj[norm(h)]=(cols[idx]||'').replace(/"/g,'').trim();
    });
    rows.push(obj);
  }
  if(!rows.length){
    document.getElementById('importPreviewArea').innerHTML='<div style="color:var(--red);padding:10px;background:rgba(239,68,68,.1);border-radius:8px">Nenhuma linha encontrada.</div>';
    return;
  }
  importPreview=rows.map(function(r){return mapearLinha(r,importType);}).filter(function(r){return r&&r!==null;});
  if(!importPreview.length){
    document.getElementById('importPreviewArea').innerHTML=
      '<div style="color:var(--red);padding:10px;background:rgba(239,68,68,.1);border-radius:8px;margin-bottom:8px">Nenhum dado valido encontrado.</div>'+
      '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:11px;color:var(--sub)">'+
      '<b style="color:var(--gold)">Colunas detectadas:</b><br>'+headers.join(' | ')+'<br><br>'+
      '<b style="color:var(--gold)">Linhas:</b> '+rows.length+'</div>';
    return;
  }
  mostrarPreview();
}

function limparValor(v){
  if(!v)return 0;
  var s=v.toString().trim();
  // Remover R$, espacos, + e - do inicio
  s=s.replace(/R\$/g,'').replace(/\+/g,'').replace(/^\s*-\s*/,'').trim();
  if(s.indexOf(',')>=0){
    // Formato BR: 1.234,56 ou 1234,56
    // Remover pontos de milhar e trocar virgula por ponto decimal
    s=s.replace(/\./g,'').replace(',','.');
  } else if(s.indexOf('.')>=0){
    // Formato com ponto: verificar se e decimal ou milhar
    var pts=s.split('.');
    if(pts.length===2 && pts[1].length<=2){
      // 400.00 ou 97258.64 -> ponto decimal, usar direto
    } else {
      // 1.234.567 -> pontos de milhar, remover
      s=s.replace(/\./g,'');
    }
  }
  s=s.replace(/[^0-9.]/g,'');
  return Number(s)||0;
}

function mapearLinha(row,tipo){
  function find(keys){
    for(var i=0;i<keys.length;i++){
      for(var k in row){
        if(k.toLowerCase().trim().indexOf(keys[i].toLowerCase())>=0&&(row[k]||'').trim()!=='') return (row[k]||'').trim();
      }
    }
    return '';
  }

  if(tipo==='clientes'){
    var nome=find(['nome cliente','nome','name','razao']);
    if(!nome) return null;
    var cpfcnpj=find(['cpf','cnpj']);
    var isCnpj=cpfcnpj.replace(/\D/g,'').length>11;
    return {
      name:nome,
      cpf:isCnpj?'':cpfcnpj,
      cnpj:isCnpj?cpfcnpj:'',
      phone:find(['telefone','fone','celular','whatsapp','tel']),
      address:find(['endereco','endereço','rua','logradouro']),
      city:find(['cidade','city','municipio']),
      state:find(['estado','uf']),
      cep:find(['cep','zip']),
      obs:find(['obs','observ','nota']),
      createdAt:today()
    };
  }

  if(tipo==='vendas'){
    function norm2(s){
      return (s||'').toString().toLowerCase()
        .replace(/[àáâãäå]/g,'a').replace(/[èéêë]/g,'e')
        .replace(/[ìíîï]/g,'i').replace(/[òóôõö]/g,'o')
        .replace(/[ùúûü]/g,'u').replace(/[ç]/g,'c')
        .replace(/[ñ]/g,'n').replace(/[^a-z0-9 ]/g,' ').trim();
    }
    function find(keys){
      for(var i=0;i<keys.length;i++){
        for(var k in row){
          var kn=norm2(k);
          if(kn.indexOf(keys[i])>=0&&(row[k]||'').trim()!=='') return (row[k]||'').trim();
        }
      }
      return '';
    }

    // Colunas exatas do CSV:
    // Data Venda, Nome Cliente, Cpf, Placa, Veículo, Valor Venda, custo, Comissão, Tx Canal
    var nomeCliente = find(['nome cliente','nome cli','cliente','nome']);
    var veiculo     = find(['veiculo','ve culo','carro','modelo','automovel']);
    var placa       = find(['placa','plate']);
    var valorStr    = find(['valor venda','valor vend','valor']);
    var custoStr    = find(['custo']);
    var comissao    = limparValor(find(['comissao','comiss']));
    var txCanal     = limparValor(find(['tx canal','txcanal','tx']));
    var cpfcnpj     = find(['cpf','cnpj']);
    var dataVenda   = find(['data venda','data']);

    if(!veiculo && !nomeCliente) return null;

    var valor  = limparValor(valorStr);
    var custo  = limparValor(custoStr);

    // status: todas as vendas do histórico = concluida
    var status = 'concluida';

    return {
      vehicle:      veiculo,
      value:        valor,
      cost:         custo,
      channelValue: 0,
      comissao:     comissao,
      txCanal:      txCanal,
      despachante:  0,
      transferencia:0,
      multas:       0,
      vistoria:     0,
      frete:        0,
      outros:       0,
      plate:        (placa||'').toUpperCase(),
      km:           '',
      year:         '',
      status:       status,
      saleDate:     formatarData(dataVenda),
      clientName:   nomeCliente,
      notes:        cpfcnpj && cpfcnpj!=='0' ? 'CPF/CNPJ: '+cpfcnpj : '',
      docsSent:     true,
      docsReceived: true,
      createdAt:    formatarData(dataVenda)||today()
    };
  }

  if(tipo==='gastos'){
    var desc=find(['descricao','desc','historico','item','produto','servico']);
    var val=find(['valor','value','preco','total']);
    var dt=find(['data','date']);
    if(!desc||!val) return null;
    return {
      desc:desc,
      value:limparValor(val),
      date:formatarData(dt)||today(),
      category:find(['categoria','cat','tipo'])||'outros',
      plate:(find(['placa','plate'])||'').toUpperCase(),
      notes:find(['obs','observ','nota'])
    };
  }
  if(tipo==='financeiro'){
    var tipoFin=(find(['tipo'])||'').toLowerCase().trim();
    if(tipoFin.indexOf('entrada')>=0) tipoFin='entrada';
    else if(tipoFin.indexOf('saida')>=0||tipoFin.indexOf('saida')>=0) tipoFin='saida';
    else return null;
    var valFin=find(['valor (r$)','valor r$','valor_r','valor']);
    var dtFin=find(['data','date']);
    if(!valFin) return null;
    var descFin=find(['descricao','descrição','descriç','descri','desc','historico'])||'-';
    var obsVal=find(['obs','observ','nota'])||'';
    // Pegar parceiro do campo obs se tiver
    var parcNome='';
    if(obsVal.indexOf('Parceiro:')>=0){parcNome=obsVal.split('Parceiro:')[1].trim();}
    return {
      tipo:tipoFin,
      valor:Math.abs(limparValor(valFin)),
      descricao:descFin,
      date:formatarData(dtFin)||today(),
      categoria:find(['categoria','cat'])||'',
      plate:(find(['placa','plate'])||'').toUpperCase(),
      formaPgto:find(['forma pgto','forma','pgto','pagamento'])||'',
      obs:obsVal,
      parceiroNome:parcNome
    };
  }
  return null;
}

function formatarData(d){
  if(!d)return today();
  d=d.trim();
  // formato dd/mm/yyyy
  var m1=d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m1)return (m1[3].length===2?'20'+m1[3]:m1[3])+'-'+m1[2].padStart(2,'0')+'-'+m1[1].padStart(2,'0');
  // formato yyyy-mm-dd
  var m2=d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m2)return d;
  return today();
}

  var h='<div style="margin-top:16px">'+

function confirmarImportacao(){
  if(!importPreview.length)return;
  var colecao=importType==='clientes'?'clients':importType==='vendas'?'sales':importType==='financeiro'?'financeiro':'expenses';
  var total=importPreview.length;
  var count=0;
  var erros=0;

  document.getElementById('importPreviewArea').innerHTML='<div style="text-align:center;padding:30px;color:var(--gold)"><div class="spinner"></div><div style="margin-top:10px">Importando '+total+' registros...</div></div>';

  // Para vendas, tenta vincular cliente pelo nome
  function salvarRegistro(r){
    if(importType==='clientes'){
      r.clienteId=clients.length+count+1;
    }
    if(importType==='vendas' && r.clientName){
      // busca cliente pelo nome (comparacao parcial)
      var nomeBusca=(r.clientName||'').toLowerCase().trim();
      var clienteEncontrado=clients.find(function(c){
        return (c.name||'').toLowerCase().trim()===nomeBusca ||
               (c.name||'').toLowerCase().indexOf(nomeBusca)>=0 ||
               nomeBusca.indexOf((c.name||'').toLowerCase())>=0;
      });
      if(clienteEncontrado){
        r.clientId=clienteEncontrado.id;
      }
      delete r.clientName;
    }
    // calcula custo total somando todos os campos extras
    if(importType==='vendas'){
      var totalCustos=Number(r.cost||0)+Number(r.despachante||0)+Number(r.transferencia||0)+Number(r.multas||0)+Number(r.vistoria||0)+Number(r.comissao||0)+Number(r.frete||0)+Number(r.txCanal||0)+Number(r.outros||0);
      r.custoTotal=totalCustos;
    }
    return db.collection(colecao).add(r);
  }

  importPreview.forEach(function(r){
    salvarRegistro(r).then(function(){
      count++;
      if(count+erros===total){
        importPreview=[];
        notify('Importacao concluida! '+count+' registros importados'+(erros>0?' ('+erros+' erros)':'')+'!');
        render();
      }
    }).catch(function(e){
      erros++;
      if(count+erros===total){
        importPreview=[];
        notify(count+' importados, '+erros+' erros','err');
        render();
      }
    });
  });
}

function renderCategories(){
  var list=categories.map(function(c){return '<div class="cat-item"><span style="font-size:12px;font-weight:600">'+c.label+'</span><div style="display:flex;gap:6px;align-items:center"><span style="font-size:10px;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:99px">'+c.key+'</span><button class="btn-icon" onclick="deleteCategory(\''+c.id+'\')">X</button></div></div>';}).join('');
  return '<div style="max-width:500px"><div class="report-card"><div class="report-title">Categorias de Gastos</div><div>'+(list||'<div style="color:var(--muted);font-size:12px">Nenhuma categoria</div>')+'</div><div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border)"><div style="font-size:11px;color:var(--gold-dark);font-weight:700;margin-bottom:8px">NOVA CATEGORIA</div><div style="display:flex;gap:8px"><input id="newCatLabel" placeholder="Nome da categoria..."><button class="btn btn-primary" onclick="addCategory()">+ Adicionar</button></div></div></div></div>';
}
function addCategory(){
  var label=gv('newCatLabel').trim();
  if(!label){notify('Digite o nome','err');return;}
  var key=label.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  if(categories.find(function(c){return c.key===key;})){notify('Ja existe','err');return;}
  db.collection('categories').add({key:key,label:label}).then(function(){notify('Adicionada!');document.getElementById('newCatLabel').value='';}).catch(function(e){notify('Erro: '+e.message,'err');});
}
function deleteCategory(id){confirmDlg('Excluir Categoria','Tem certeza?',function(){db.collection('categories').doc(id).delete().then(function(){notify('Removida','err');}).catch(function(e){notify('Erro: '+e.message,'err');});});}

  if(!s)return;
  var cl=getClient(s.clientId);
  var extras=Number(s.despachante||0)+Number(s.transferencia||0)+Number(s.multas||0)+Number(s.vistoria||0)+Number(s.comissao||0)+Number(s.frete||0)+Number(s.txCanal||0)+Number(s.outros||0);
  var lc=Number(s.value||0)-Number(s.cost||0)-Number(s.channelValue||0)-extras;

  function row(label,val,cor){return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted);font-size:13px">'+label+'</span><span style="color:'+(cor||'var(--text)')+';font-weight:700">'+val+'</span></div>';}
  var body='<div style="margin-bottom:16px;padding:12px;background:var(--bg);border-radius:10px;border:1px solid var(--border)">';

  body+='<div style="display:flex;justify-content:space-between;padding:12px 0;margin-top:8px;border-top:2px solid var(--border)">';
  body+='<span style="font-weight:800;font-size:15px">LUCRO LIQUIDO</span>';

  if(s.notes)body+='<div style="margin-top:12px;padding:8px 12px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--sub)">📝 '+s.notes+'</div>';
  showModal((s.vehicle||'Venda')+' — '+fmtDate(s.saleDate||s.createdAt),body,null);
}
function calcDRE(m){
  var mS=sales.filter(function(s){return monthKey(s.saleDate||s.createdAt)===m&&s.status!=='cancelada';});
  var done=mS.filter(function(s){return ETAPAS_FINANCEIRO.indexOf(s.status)>=0;});
  var pending=mS.filter(function(s){return ETAPAS_FINANCEIRO.indexOf(s.status)<0;});
  var mE=expenses.filter(function(e){return monthKey(e.date)===m;});
  var mF=financeiro.filter(function(f){return monthKey(f.date)===m;});
  var receita=done.reduce(function(a,s){return a+Number(s.value||0);},0);
  var cmv=done.reduce(function(a,s){return a+Number(s.cost||0)+Number(s.channelValue||0);},0);
  // Custos extras das vendas (despachante, comissao etc cadastrados na venda)
  var custosExtras=done.reduce(function(a,s){return a+Number(s.despachante||0)+Number(s.transferencia||0)+Number(s.multas||0)+Number(s.vistoria||0)+Number(s.comissao||0)+Number(s.frete||0)+Number(s.txCanal||0)+Number(s.outros||0);},0);
  var lucBrt=receita-cmv-custosExtras;
  var despOper=mE.reduce(function(a,e){return a+Number(e.value||0);},0);
  // Comissoes do financeiro (excluindo lancamentos automaticos gerados pelas vendas)
  var comissoes=mF.filter(function(f){var c=(f.categoria||'').toLowerCase();return f.tipo==='saida'&&c==='comissao'&&!f.autoCusto;}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  // Despesas operacionais do financeiro
  var despFin=mF.filter(function(f){var c=(f.categoria||'').toLowerCase();return f.tipo==='saida'&&(c==='despesa'||c==='custo fixo'||c==='imposto'||c==='contabilidade'||c==='documentacao')&&!f.autoCusto;}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var lucLiq=lucBrt-despOper-comissoes-despFin;
  var margem=receita>0?((lucLiq/receita)*100).toFixed(1):0;
  var cxEnt=mF.filter(function(f){return f.tipo==='entrada';}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var cxSai=mF.filter(function(f){return f.tipo==='saida';}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var saldoPeriodo=cxEnt-cxSai;
  // Saldo acumulado = todas as movimentacoes ate o final do mes selecionado
  var saldoAcum=financeiro.filter(function(f){return f.date<=m+'-31';}).reduce(function(a,f){return a+Number(f.valor||0)*(f.tipo==='entrada'?1:-1);},0);
  var aReceber=pending.reduce(function(a,s){return a+Number(s.value||0);},0);
  return {done:done,pending:pending,mE:mE,mF:mF,receita:receita,cmv:cmv,custosExtras:custosExtras,lucBrt:lucBrt,despOper:despOper,comissoes:comissoes,despFin:despFin,lucLiq:lucLiq,margem:margem,cxEnt:cxEnt,cxSai:cxSai,saldoPeriodo:saldoPeriodo,saldoCx:saldoAcum,aReceber:aReceber};
}

  var temSai=Object.keys(saiCats).length;
  if(temSai){Object.keys(saiCats).forEach(function(c){h+='<div class="dre-row"><span>'+c+'</span><span style="color:#EF4444">-'+fmtCur(saiCats[c])+'</span></div>';});}

function repGeral(){
  var done=sales.filter(function(s){return ETAPAS_FINANCEIRO.indexOf(s.status)>=0;});

  var h='<div class="card-grid" style="margin-bottom:16px">';
  cards.forEach(function(c){h+='<div class="card" style="border-left:3px solid '+c[2]+'"><div class="card-value" style="color:'+c[2]+'">'+c[1]+'</div><div class="card-label">'+c[0]+'</div></div>';});
  h+='</div><div class="report-card"><div class="report-title">Todas as Vendas</div><div class="table-wrap"><table><thead><tr><th>Veiculo</th><th>Placa</th><th>Cliente</th><th>Data</th><th>Valor</th><th>Custo</th><th>Canal</th><th>Desp.</th><th>Transf.</th><th>Multas</th><th>Com.</th><th>Outros</th><th>Lucro</th><th>Margem</th><th>Status</th></tr></thead><tbody>';
  sales.forEach(function(s){
    var cl=getClient(s.clientId);
    var ge=expenses.filter(function(e){return e.plate===s.plate;}).reduce(function(a,e){return a+Number(e.value||0);},0);
    var extras=Number(s.despachante||0)+Number(s.transferencia||0)+Number(s.multas||0)+Number(s.vistoria||0)+Number(s.comissao||0)+Number(s.frete||0)+Number(s.txCanal||0)+Number(s.outros||0);
    var lc=Number(s.value||0)-Number(s.cost||0)-Number(s.channelValue||0)-extras-ge;
    var mg=Number(s.value||0)>0?((lc/Number(s.value))*100).toFixed(1):0;
    h+='<tr><td style="font-weight:600">'+(s.vehicle||'')+' '+(s.year||'')+'</td><td style="color:var(--cyan)">'+(s.plate||'')+'</td><td style="font-size:11px">'+(cl.name||'-')+'</td><td style="font-size:11px">'+fmtDate(s.saleDate||s.createdAt)+'</td><td style="color:var(--gold)">'+fmtCur(s.value)+'</td><td>'+fmtCur(s.cost)+'</td><td>'+fmtCur(s.channelValue||0)+'</td><td>'+fmtCur(s.despachante||0)+'</td><td>'+fmtCur(s.transferencia||0)+'</td><td>'+fmtCur(s.multas||0)+'</td><td>'+fmtCur(s.comissao||0)+'</td><td>'+fmtCur(Number(s.vistoria||0)+Number(s.frete||0)+Number(s.txCanal||0)+Number(s.outros||0))+'</td><td style="color:'+(lc>=0?'#4A90D9':'#EF4444')+';font-weight:700">'+fmtCur(lc)+'</td><td style="color:var(--gold)">'+mg+'%</td><td>'+sbadge(s.status)+'</td></tr>';
  });
  if(!sales.length)h+='<tr><td colspan="15" class="empty">Nenhuma venda</td></tr>';

      '<span style="background:'+(mgColor==='#4CAF7D'?'rgba(76,175,125,.15)':mgColor==='var(--gold)'?'rgba(201,168,76,.12)':'rgba(239,68,68,.12)')+';color:'+mgColor+';border-radius:20px;padding:3px 9px;font-size:11px;font-weight:700">'+r.mg+'%</span></td>';
    h+='<td style="padding:12px 14px;text-align:right;white-space:nowrap;font-weight:700;color:'+(r.cxAcum>=0?'#10b981':'#EF4444')+'">'+fmtCur(r.cxAcum)+'</td>';
    h+='</tr>';
  });

  if(!rows.length){
    h+='<tr><td colspan="11" style="padding:40px;text-align:center;color:var(--muted)">Sem dados</td></tr>';
  }else{
    h+='<tr style="background:rgba(201,168,76,.05);border-top:2px solid rgba(201,168,76,.2)">';
    h+='<td style="padding:12px 14px;font-weight:800;color:var(--gold)">TOTAL</td>';
    h+='<td style="padding:12px 14px;text-align:right;font-weight:800;color:var(--gold)">'+totQtd+'</td>';
    h+='<td style="padding:12px 14px;text-align:right;color:#4CAF7D;font-weight:800">'+fmtCur(totRev)+'</td>';
    h+='<td colspan="5" style="padding:12px 14px;text-align:center;color:var(--muted);font-size:11px">—</td>';
    h+='<td style="padding:12px 14px;text-align:right;font-weight:800;font-size:14px;color:'+(totLc>=0?'#4CAF7D':'#EF4444')+'">'+fmtCur(totLc)+'</td>';
    h+='<td style="padding:12px 14px;text-align:right"><span style="background:rgba(201,168,76,.15);color:var(--gold);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:800">'+totMg+'%</span></td>';
    h+='<td style="padding:12px 14px"></td>';
    h+='</tr>';
  }
  h+='</tbody></table></div></div>';

  // GRAFICOS
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:22px">';

  // Grafico Resultado
  h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px">';
  h+='<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:18px">Resultado por Mes</div>';
  var maxAbs=1;rows.forEach(function(r){if(Math.abs(r.lc)>maxAbs)maxAbs=Math.abs(r.lc);});
  rows.forEach(function(r){
    var pct=Math.max((Math.abs(r.lc)/maxAbs*90),2).toFixed(0);
    var isPos=r.lc>=0;
    h+='<div style="margin-bottom:14px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">';
    h+='<button onclick="dreMonth=\''+r.m+'\';goTo(\'dre\')" style="background:none;border:none;cursor:pointer;color:var(--gold);font-size:11px;font-weight:600;padding:0">'+r.m+' &#8599;</button>';
    h+='<span style="color:'+(isPos?'#4CAF7D':'#EF4444')+';font-weight:700;font-size:11px">'+fmtCur(r.lc)+'</span></div>';
    h+='<div style="height:10px;background:rgba(255,255,255,.04);border-radius:99px;overflow:hidden">';
    h+='<div style="height:100%;width:'+pct+'%;background:'+(isPos?'linear-gradient(90deg,#10b981,#4CAF7D)':'linear-gradient(90deg,#DC2626,#EF4444)')+';border-radius:99px"></div></div>';
    h+='<div style="display:flex;justify-content:space-between;margin-top:3px;font-size:10px;color:var(--muted)"><span>'+r.qtd+' venda(s)</span><span>'+r.mg+'% margem</span></div>';
    h+='</div>';
  });
  if(!rows.length)h+='<div style="color:var(--muted);font-size:12px">Sem dados</div>';
  h+='</div>';

  // Grafico Receita vs Resultado
  h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px">';
  h+='<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:6px">Receita vs Resultado</div>';
  h+='<div style="display:flex;gap:12px;margin-bottom:16px;font-size:10px">';
  h+='<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:3px;background:#4CAF7D"></div><span style="color:var(--muted)">Receita</span></div>';
  h+='<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:3px;background:var(--gold)"></div><span style="color:var(--muted)">Resultado</span></div>';
  h+='</div>';
  var maxRevGr=1;rows.forEach(function(r){if(r.rev>maxRevGr)maxRevGr=r.rev;});
  rows.forEach(function(r){
    var pRev=Math.max((r.rev/maxRevGr*90),r.rev>0?3:0).toFixed(0);
    var pLc=r.rev>0?Math.max((Math.abs(r.lc)/maxRevGr*90),r.lc!==0?2:0).toFixed(0):0;
    h+='<div style="margin-bottom:12px">';
    h+='<div style="font-size:10px;color:var(--muted);margin-bottom:5px;font-weight:600">'+r.m+'</div>';
    h+='<div style="display:flex;flex-direction:column;gap:4px">';
    h+='<div style="height:8px;background:rgba(255,255,255,.04);border-radius:99px;overflow:hidden"><div style="height:100%;width:'+pRev+'%;background:linear-gradient(90deg,#10b981,#4CAF7D);border-radius:99px"></div></div>';
    h+='<div style="height:8px;background:rgba(255,255,255,.04);border-radius:99px;overflow:hidden"><div style="height:100%;width:'+pLc+'%;background:'+(r.lc>=0?'linear-gradient(90deg,#8B6914,#C9A84C)':'linear-gradient(90deg,#DC2626,#EF4444)')+';border-radius:99px"></div></div>';
    h+='</div>';
    h+='<div style="display:flex;justify-content:space-between;margin-top:3px;font-size:10px"><span style="color:var(--muted)">'+fmtCur(r.rev)+'</span><span style="color:'+(r.lc>=0?'var(--gold)':'#EF4444')+';font-weight:700">'+fmtCur(r.lc)+'</span></div>';
    h+='</div>';
  });
  if(!rows.length)h+='<div style="color:var(--muted);font-size:12px">Sem dados</div>';
  h+='</div>';
  h+='</div>';

  // ALERTAS AUTOMATICOS
  var alertas=[];
  if(rows.length>=2){
    var ultimas=rows.slice(-3);
    var caindo=ultimas.every(function(r,i){return i===0||Number(r.mg)<=Number(ultimas[i-1].mg);});
    if(caindo&&Number(ultimas[ultimas.length-1].mg)<5){
      alertas.push({icon:'&#9660;',color:'#EF4444',bg:'rgba(239,68,68,.08)',border:'rgba(239,68,68,.2)',titulo:'Margem em Queda',desc:'Margem caindo consecutivamente. Atual: '+ultimas[ultimas.length-1].mg+'%. Revise os custos operacionais.'});
    }
  }
  if(rows.length>0){
    var melhor=rows.reduce(function(a,b){return b.lc>a.lc?b:a;});
    if(melhor.lc>0)alertas.push({icon:'&#11088;',color:'#C9A84C',bg:'rgba(201,168,76,.08)',border:'rgba(201,168,76,.2)',titulo:'Melhor Mes: '+melhor.m,desc:'Resultado de '+fmtCur(melhor.lc)+' com margem de '+melhor.mg+'% em '+melhor.qtd+' venda(s).'});
  }
  if(rows.length>=2){
    var penultimo=rows[rows.length-2],ultimo=rows[rows.length-1];
    if(penultimo.rev>0&&ultimo.rev>penultimo.rev){
      var crescPct=((ultimo.rev-penultimo.rev)/penultimo.rev*100).toFixed(0);
      alertas.push({icon:'&#128200;',color:'#4CAF7D',bg:'rgba(76,175,125,.08)',border:'rgba(76,175,125,.2)',titulo:'Receita Crescendo',desc:'Receita subiu '+crescPct+'% de '+penultimo.m+' para '+ultimo.m+'.'});
    }
  }
  if(alertas.length){
    h+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:22px">';
    h+='<div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:14px">&#128270; Analise Automatica</div>';
    h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px">';
    alertas.forEach(function(a){
      h+='<div style="background:'+a.bg+';border:1px solid '+a.border+';border-radius:10px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start">';
      h+='<span style="font-size:1.3rem;flex-shrink:0">'+a.icon+'</span>';
      h+='<div><div style="font-weight:700;font-size:12px;color:'+a.color+';margin-bottom:4px">'+a.titulo+'</div>';
      h+='<div style="font-size:11px;color:var(--sub);line-height:1.5">'+a.desc+'</div></div></div>';
    });
    h+='</div></div>';
  }
  return h;
}

function novaCatFin(){
  var nome=prompt('Nome da nova categoria:');
  if(!nome)return;
  nome=nome.trim();
  if(!nome){notify('Nome invalido','err');return;}
  if(CATS_FIN.indexOf(nome)>=0){notify('Categoria ja existe','err');return;}
  CATS_FIN.push(nome);
  salvarCatsFin();
  notify('Categoria "'+nome+'" adicionada!');
  // Reabrir o modal atual para atualizar o select
  var sel=document.getElementById('fin_cat');
  if(sel){
    var opt=document.createElement('option');
    opt.value=nome;opt.text=nome;opt.selected=true;
    sel.appendChild(opt);
    toggleParceiro();
  }
}
function gerenciarCatsFin(){
  var lista=CATS_FIN.map(function(c,i){
    var isDef=['Venda','Compra Veiculo','Comissao','Despesa','Custo Fixo','Retirada de Socio','Transferencia','Aplicacao CDB','Imposto','Contabilidade','Documentacao','Outros'].indexOf(c)>=0;
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">'+
      '<span style="font-size:13px">'+c+(isDef?' <span style="font-size:10px;color:var(--muted)">(padrao)</span>':'')+'</span>'+
      (!isDef?'<button onclick="removerCatFin(\''+c+'\')" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:3px 8px;color:#EF4444;font-size:11px;cursor:pointer">Remover</button>':'<span></span>')+
      '</div>';
  }).join('');
  showModal('Gerenciar Categorias do Financeiro',
    '<div style="max-height:350px;overflow-y:auto">'+lista+'</div>'+
    '<div style="margin-top:14px;display:flex;gap:8px">'+
    '<input id="nova_cat_input" placeholder="Nova categoria..." style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:13px;outline:none">'+
    '<button class="btn btn-primary btn-sm" onclick="adicionarCatFinModal()">+ Adicionar</button>'+
    '</div>',
    null
  );
}
function adicionarCatFinModal(){
  var nome=(document.getElementById('nova_cat_input').value||'').trim();
  if(!nome){notify('Digite o nome da categoria','err');return;}
  if(CATS_FIN.indexOf(nome)>=0){notify('Ja existe','err');return;}
  CATS_FIN.push(nome);
  salvarCatsFin();
  notify('Categoria "'+nome+'" adicionada!');
  closeModal();
  gerenciarCatsFin();
}
function removerCatFin(cat){
  var idx=CATS_FIN.indexOf(cat);
  if(idx>=0){CATS_FIN.splice(idx,1);salvarCatsFin();}
  notify('Categoria removida');
  closeModal();
  gerenciarCatsFin();
}
function toggleParceiro(){
  var cat=document.getElementById('fin_cat');
  var wrap=document.getElementById('fin_parceiro_wrap');
  if(cat&&wrap)wrap.style.display=cat.value==='Comissao'?'block':'none';
}
function renderParceiros(){
  var totalPago=financeiro.filter(function(f){return f.tipo==='saida'&&f.categoria==='Comissao'&&f.parceiroId;}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">';
  h+='<div class="card" style="border-left:3px solid #9B7ED4;flex:1;min-width:200px"><div class="card-value" style="color:#9B7ED4">'+fmtCur(totalPago)+'</div><div class="card-label">Total Pago em Comissoes</div></div>';
  h+='<button class="btn btn-primary" onclick="openParcModal(null)">+ Novo Parceiro</button></div>';

  // Tabela de parceiros com resumo de comissoes
  h+='<div class="report-card"><div class="report-title">&#129309; Parceiros Cadastrados</div>';
  if(parceiros.length){
    h+='<div class="table-wrap"><table><thead><tr><th>Nome</th><th>CPF/CNPJ</th><th>Telefone</th><th>% Comissao</th><th>Total Recebido</th><th>Ultima Comissao</th><th>Acoes</th></tr></thead><tbody>';
    parceiros.forEach(function(p){
      var comissoes=financeiro.filter(function(f){return f.tipo==='saida'&&f.categoria==='Comissao'&&f.parceiroId===p.id;});
      var totalP=comissoes.reduce(function(a,f){return a+Number(f.valor||0);},0);
      var ultima=comissoes.sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
      h+='<tr>';
      h+='<td style="font-weight:600">'+p.nome+'</td>';
      h+='<td style="color:var(--sub);font-size:11px">'+(p.cpf||p.cnpj||'-')+'</td>';
      h+='<td style="font-size:11px">'+(p.telefone?'<a href="https://wa.me/55'+p.telefone.replace(/\D/g,'')+'" target="_blank" style="color:#25D366">'+p.telefone+'</a>':'-')+'</td>';
      h+='<td style="color:var(--gold)">'+(p.percComissao?p.percComissao+'%':'-')+'</td>';
      h+='<td style="color:#9B7ED4;font-weight:700">'+fmtCur(totalP)+'</td>';
      h+='<td style="font-size:11px;color:var(--sub)">'+(ultima.length?fmtDate(ultima[0].date):'-')+'</td>';
      h+='<td><div style="display:flex;gap:5px">';
      h+='<button class="btn-icon" onclick="openParcModal(\''+p.id+'\')" >E</button>';
      h+='<button class="btn-icon" onclick="deleteParceiro(\''+p.id+'\')" >X</button>';
      h+='</div></td></tr>';
    });
    h+='</tbody></table></div>';
  } else {
    h+='<div style="color:var(--muted);padding:20px;text-align:center">Nenhum parceiro cadastrado ainda.</div>';
  }
  h+='</div>';

  // Historico de comissoes por parceiro
  h+='<div class="report-card" style="margin-top:14px"><div class="report-title">&#128200; Comissoes por Parceiro — Historico Mensal</div>';
  var meses=getAllMonths().reverse();
  if(meses.length&&parceiros.length){
    h+='<div class="table-wrap"><table><thead><tr><th>Parceiro</th>';
    meses.forEach(function(m){h+='<th>'+m+'</th>';});
    h+='<th>Total</th></tr></thead><tbody>';
    parceiros.forEach(function(p){
      var totalP=0;
      h+='<tr><td style="font-weight:600">'+p.nome+'</td>';
      meses.forEach(function(m){
        var val=financeiro.filter(function(f){return f.tipo==='saida'&&f.categoria==='Comissao'&&f.parceiroId===p.id&&monthKey(f.date)===m;}).reduce(function(a,f){return a+Number(f.valor||0);},0);
        totalP+=val;
        h+='<td style="color:'+(val>0?'#9B7ED4':'var(--muted)')+'">'+(val>0?fmtCur(val):'-')+'</td>';
      });
      h+='<td style="color:#9B7ED4;font-weight:700">'+fmtCur(totalP)+'</td></tr>';
    });
    h+='</tbody></table></div>';
  } else {
    h+='<div style="color:var(--muted);font-size:12px;padding:12px">Sem dados de comissao ainda.</div>';
  }
  h+='</div>';
  return h;
}
function openParcModal(id){
  var p=id?(parceiros.find(function(x){return x.id===id;})||{}):{};
  showModal((id?'Editar':'Novo')+' Parceiro',
    '<div class="form-grid">'+
    '<div class="field"><label>Nome *</label><input id="parc_nome" value="'+(p.nome||'')+'"></div>'+
    '<div class="field"><label>CPF</label><input id="parc_cpf" value="'+(p.cpf||'')+'" placeholder="000.000.000-00"></div>'+
    '<div class="field"><label>CNPJ</label><input id="parc_cnpj" value="'+(p.cnpj||'')+'" placeholder="00.000.000/0000-00"></div>'+
    '<div class="field"><label>Telefone / WhatsApp</label><input id="parc_tel" value="'+(p.telefone||'')+'" placeholder="(62) 99999-9999"></div>'+
    '<div class="field"><label>% Comissao Padrao</label><input id="parc_perc" type="number" step="0.1" value="'+(p.percComissao||'')+'" placeholder="Ex: 2.5"></div>'+
    '<div class="field"><label>Observacoes</label><input id="parc_obs" value="'+(p.obs||'')+'"></div>'+
    '</div>',
    function(){
      var nome=document.getElementById('parc_nome').value.trim();
      if(!nome){notify('Nome obrigatorio','err');return;}
      var data={nome:nome,cpf:gv('parc_cpf'),cnpj:gv('parc_cnpj'),telefone:gv('parc_tel'),percComissao:Number(gv('parc_perc'))||0,obs:gv('parc_obs'),createdAt:today()};
      if(id){db.collection('parceiros').doc(id).update(data).then(function(){notify('Atualizado!');closeModal();}).catch(function(e){notify('Erro: '+e.message,'err');});}
      else{db.collection('parceiros').add(data).then(function(){notify('Cadastrado!');closeModal();}).catch(function(e){notify('Erro: '+e.message,'err');});}
    }
  );
}
function deleteParceiro(id){
  confirmDlg('Excluir Parceiro','Tem certeza? Os lancamentos vinculados a ele nao serao apagados.',function(){
    db.collection('parceiros').doc(id).delete().then(function(){notify('Removido','err');}).catch(function(e){notify('Erro: '+e.message,'err');});
  });
}

function csvDownload(nome,linhas){
  var bom='﻿';
  var blob=new Blob([bom+linhas.join('\n')],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=nome+'_'+today()+'.csv';
  a.click();
}
function exportVendas(){
  var header='Veiculo,Ano,Placa,Cliente,Data Venda,Status,Valor Venda,Custo,Canal,Despachante,Transferencia,Multas,Vistoria,Comissao,Frete,TxCanal,Outros,Lucro,Margem%,KM,Obs';
  var rows=sales.map(function(s){
    var cl=getClient(s.clientId);
    var extras=Number(s.despachante||0)+Number(s.transferencia||0)+Number(s.multas||0)+Number(s.vistoria||0)+Number(s.comissao||0)+Number(s.frete||0)+Number(s.txCanal||0)+Number(s.outros||0);
    var lc=Number(s.value||0)-Number(s.cost||0)-Number(s.channelValue||0)-extras;
    var mg=Number(s.value||0)>0?((lc/Number(s.value))*100).toFixed(1):0;
    return [s.vehicle,s.year,s.plate,cl.name,s.saleDate||s.createdAt,(STATUS_MAP[s.status]||{label:s.status}).label,s.value,s.cost,s.channelValue||0,s.despachante||0,s.transferencia||0,s.multas||0,s.vistoria||0,s.comissao||0,s.frete||0,s.txCanal||0,s.outros||0,lc.toFixed(2),mg,s.km||0,s.notes||''].join(',');
  });
  csvDownload('vendas',[header].concat(rows));
  notify('Exportado: '+rows.length+' vendas!');
}
function exportFinanceiro(){
  var header='Data,Tipo,Descricao,Categoria,Parceiro,Valor,Placa,Obs';
  var rows=financeiro.map(function(f){
    return [f.date,f.tipo,f.descricao||'',f.categoria||'',f.parceiroNome||'',f.valor,f.plate||'',f.obs||''].join(',');
  });

function editarPermissoes(user){
  var perms=PERMISSOES_USUARIOS[user]||PERMISSOES_PADRAO.slice();
  var allTabs=TABS.filter(function(t){return t.id!=='usuarios';});
  var checks=allTabs.map(function(t){
    var checked=perms.indexOf(t.id)>=0;
    return '<label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:7px 10px;background:var(--bg);border-radius:8px;border:1px solid var(--border);margin-bottom:4px">'+
      '<input type="checkbox" id="perm_'+t.id+'"'+(checked?' checked':'')+'>'+
      '<span style="font-size:13px">'+ICONS[t.id]+' '+t.label+'</span>'+
      '</label>';
  }).join('');
  showModal('Permissoes — '+user,
    '<div style="color:var(--sub);font-size:12px;margin-bottom:12px">Selecione as abas que <strong>'+user+'</strong> pode acessar:</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'+checks+'</div>',
    function(){
      var novas=allTabs.filter(function(t){
        var el=document.getElementById('perm_'+t.id);
        return el&&el.checked;
      }).map(function(t){return t.id;});
      PERMISSOES_USUARIOS[user]=novas;
      salvarPermissoes();
      notify('Permissoes de '+user+' atualizadas!');

function adicionarUsuario(){
  showModal('Adicionar Usuario',
    '<div class="form-grid">'+
    '<div class="field"><label>Nome de Usuario</label><input id="nu_user" placeholder="Ex: vendedor1"></div>'+
    '<div class="field"><label>Senha</label><input type="password" id="nu_pass" placeholder="Minimo 6 caracteres"></div>'+
    '<div class="field"><label>Confirmar Senha</label><input type="password" id="nu_pass2" placeholder="Repita a senha"></div>'+
    '</div>',
    function(){
      var user=(document.getElementById('nu_user').value||'').trim().toLowerCase();
      var pass=document.getElementById('nu_pass').value||'';
      var pass2=document.getElementById('nu_pass2').value||'';
      if(!user||user.length<3){notify('Usuario deve ter pelo menos 3 caracteres','err');return;}
      if(USUARIOS[user]){notify('Usuario ja existe','err');return;}
      if(pass.length<6){notify('Senha deve ter pelo menos 6 caracteres','err');return;}
      if(pass!==pass2){notify('Senhas nao conferem','err');return;}
      USUARIOS[user]=pass;salvarUsuarios();notify('Usuario '+user+' criado!');closeModal();render();
    }
  );
}
function alterarSenha(user){
  showModal('Alterar Senha — '+user,
    '<div class="form-grid">'+
    (user===usuarioLogado?'<div class="field"><label>Senha Atual</label><input type="password" id="ap_atual"></div>':'')+
    '<div class="field"><label>Nova Senha</label><input type="password" id="ap_nova" placeholder="Minimo 6 caracteres"></div>'+
    '<div class="field"><label>Confirmar</label><input type="password" id="ap_nova2"></div>'+
    '</div>',
    function(){
      if(user===usuarioLogado){var a=document.getElementById('ap_atual').value||'';if(a!==USUARIOS[user]){notify('Senha atual incorreta','err');return;}}
      var n=document.getElementById('ap_nova').value||'';
      var n2=document.getElementById('ap_nova2').value||'';
      if(n.length<6){notify('Senha deve ter pelo menos 6 caracteres','err');return;}
      if(n!==n2){notify('Senhas nao conferem','err');return;}
      USUARIOS[user]=n;salvarUsuarios();notify('Senha alterada!');closeModal();
    }
  );
}
function removerUsuario(user){
  if(user==='admin'||user===usuarioLogado){notify('Nao e possivel remover este usuario','err');return;}

}

  h+='<div style="font-size:11px;color:var(--muted);margin-top:8px">&#8505; Informe o valor que ja estava aplicado antes de comecar a usar o sistema. Nao afeta o fluxo de caixa.</div>';

  h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:16px">';

  h+='<div class="card" style="border-left:3px solid #10b981">';
  h+='<div style="font-size:10px;color:var(--gold-dark);font-weight:700;margin-bottom:6px">&#128176; SALDO ATUAL APLICADO</div>';
  h+='<div style="font-size:22px;font-weight:800;color:#10b981">'+fmtCur(saldoAplicado)+'</div>';
  h+='<div style="font-size:10px;color:var(--muted);margin-top:4px">Inicial + Aplicacoes - Resgates</div>';

    h+='<div class="card" style="border-left:3px solid #64748b">';

    h+='</div>';
  }

  h+='<div class="card" style="border-left:3px solid #EF4444">';
  h+='<div style="font-size:10px;color:var(--gold-dark);font-weight:700;margin-bottom:6px">&#128200; TOTAL APLICADO</div>';
  h+='<div style="font-size:22px;font-weight:800;color:#EF4444">'+fmtCur(totalAplicado)+'</div>';
  h+='<div style="font-size:10px;color:var(--muted);margin-top:4px">Lancamentos no sistema</div>';
  h+='</div>';

  h+='<div class="card" style="border-left:3px solid #4A90D9">';
  h+='<div style="font-size:10px;color:var(--gold-dark);font-weight:700;margin-bottom:6px">&#128181; TOTAL RESGATADO</div>';
  h+='<div style="font-size:22px;font-weight:800;color:#4A90D9">'+fmtCur(totalResgatado)+'</div>';
  h+='<div style="font-size:10px;color:var(--muted);margin-top:4px">Lancamentos no sistema</div>';
  h+='</div>';

  if(rendimento>0){
    h+='<div class="card" style="border-left:3px solid #C9A84C">';
    h+='<div style="font-size:10px;color:var(--gold-dark);font-weight:700;margin-bottom:6px">&#9733; RENDIMENTO</div>';
    h+='<div style="font-size:22px;font-weight:800;color:#C9A84C">'+fmtCur(rendimento)+'</div>';
    h+='<div style="font-size:10px;color:var(--muted);margin-top:4px">Ganho nas aplicacoes</div>';
    h+='</div>';
  }
  h+='</div>';

  // Evolucao por mes
  var meses=getAllMonths();
  if(meses.length){
    h+='<div class="report-card" style="margin-bottom:14px"><div class="report-title">&#128200; Evolucao por Mes</div>';
