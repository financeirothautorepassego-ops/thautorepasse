      var mApl=aplicacoes.filter(function(f){return monthKey(f.date)===m&&f.tipo==='saida';}).reduce(function(a,f){return a+Number(f.valor||0);},0);
      var mRes=aplicacoes.filter(function(f){return monthKey(f.date)===m&&f.tipo==='entrada';}).reduce(function(a,f){return a+Number(f.valor||0);},0);
      if(mApl===0&&mRes===0)return;
      h+='<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px">';
      h+='<div style="font-weight:700;color:var(--gold);font-size:12px;margin-bottom:8px">'+m+'</div>';
      if(mApl>0)h+='<div style="font-size:11px;color:#EF4444;margin-bottom:3px">&#128200; Aplicado: '+fmtCur(mApl)+'</div>';
      if(mRes>0)h+='<div style="font-size:11px;color:#4A90D9">&#128176; Resgatado: '+fmtCur(mRes)+'</div>';
      var liq=mRes-mApl;
      h+='<div style="font-size:10px;color:'+(liq>=0?'#10b981':'#EF4444')+';margin-top:4px;font-weight:600">Liq: '+(liq>=0?'+':'')+fmtCur(liq)+'</div>';
      h+='</div>';
    });
    h+='</div></div>';
  }

  // Historico
  h+='<div class="report-card"><div class="report-title">&#128196; Historico de Aplicacoes e Resgates</div>';
  if(aplicacoes.length){
    var sorted=aplicacoes.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});
    h+='<div class="table-wrap"><table><thead><tr><th>Data</th><th>Tipo</th><th>Descricao</th><th>Valor</th></tr></thead><tbody>';
    sorted.forEach(function(f){
      var isApl=f.tipo==='saida';
      h+='<tr>';
      h+='<td style="font-size:11px">'+fmtDate(f.date)+'</td>';
      h+='<td><span class="sbadge" style="background:'+(isApl?'rgba(239,68,68,.12)':'rgba(74,144,217,.12)')+';color:'+(isApl?'#EF4444':'#4A90D9')+';border:1px solid '+(isApl?'rgba(239,68,68,.3)':'rgba(74,144,217,.3)')+'">'+( isApl?'&#128200; Aplicacao':'&#128176; Resgate')+'</span></td>';
      h+='<td style="font-size:11px;color:var(--sub)">'+(f.descricao||'CDB')+'</td>';
      h+='<td style="font-weight:700;color:'+(isApl?'#EF4444':'#4A90D9')+'">'+(isApl?'-':'+')+fmtCur(f.valor)+'</td>';
      h+='</tr>';
    });
    h+='<tr style="background:rgba(255,255,255,.04);font-weight:700"><td colspan="3">SALDO ATUAL APLICADO</td>';
    h+='<td style="color:#10b981;font-size:15px">'+fmtCur(saldoAplicado)+'</td></tr>';
    h+='</tbody></table></div>';
  }else{
    h+='<div style="color:var(--muted);padding:30px;text-align:center">Nenhuma aplicacao lancada.<br><small>Lance no Financeiro com categoria <strong>Aplicacao CDB</strong></small></div>';
  }
  h+='</div>';
  return h;
}
// ── CHAMADOS ─────────────────────────────
function renderChamados(){
  var abertos=chamados.filter(function(c){return c.status==='aberto';});
  var andamento=chamados.filter(function(c){return c.status==='andamento';});
  var finalizados=chamados.filter(function(c){return c.status==='finalizado';});
  var totalValor=chamados.reduce(function(a,c){return a+Number(c.valor||0);},0);

  var h='';

  // Cards resumo
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px">';
  h+='<div class="card" style="border-left:3px solid #EF4444"><div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px">ABERTOS</div><div style="font-size:26px;font-weight:800;color:#EF4444">'+abertos.length+'</div></div>';
  h+='<div class="card" style="border-left:3px solid #f59e0b"><div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px">EM ANDAMENTO</div><div style="font-size:26px;font-weight:800;color:#f59e0b">'+andamento.length+'</div></div>';
  h+='<div class="card" style="border-left:3px solid #10b981"><div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px">FINALIZADOS</div><div style="font-size:26px;font-weight:800;color:#10b981">'+finalizados.length+'</div></div>';
  h+='<div class="card" style="border-left:3px solid #C9A84C"><div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px">TOTAL ENVOLVIDO</div><div style="font-size:20px;font-weight:800;color:#C9A84C">'+fmtCur(totalValor)+'</div></div>';
  h+='</div>';

  // Barra de acoes
  h+='<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center">';
  h+='<button class="btn btn-primary" onclick="openChamadoModal(null)">+ Novo Chamado</button>';
  h+='<div class="search-wrap" style="flex:1;min-width:200px"><span class="search-icon">&#128269;</span><input id="chamSearch" placeholder="Buscar por placa, numero ou descricao..." oninput="reRenderCham()" style="width:100%"></div>';
  h+='<select id="chamFiltro" onchange="reRenderCham()" style="min-width:150px"><option value="todos">Todos</option><option value="aberto">Abertos</option><option value="andamento">Em Andamento</option><option value="finalizado">Finalizados</option></select>';
  h+='</div>';

  // Lista
  h+='<div id="chamLista">'+buildChamLista(chamados,'')+'</div>';
  return h;
}

function buildChamLista(lista, q){
  var filtro=(document.getElementById('chamFiltro')||{}).value||'todos';
  var filtradas=lista.filter(function(c){
    var textoOk=!q||((c.placa||'')+(c.numeroChamado||'')+(c.descricao||'')+(c.veiculo||'')).toLowerCase().indexOf(q.toLowerCase())>=0;
    var statusOk=filtro==='todos'||c.status===filtro;
    return textoOk&&statusOk;
  }).sort(function(a,b){
    var ord={aberto:0,andamento:1,finalizado:2};
    return (ord[a.status]||0)-(ord[b.status]||0)||(b.dataAbertura||'').localeCompare(a.dataAbertura||'');
  });

  if(!filtradas.length) return '<div style="color:var(--muted);text-align:center;padding:40px;font-size:13px">Nenhum chamado encontrado</div>';

  var statusCfg={
    aberto:{label:'Aberto',color:'#EF4444',bg:'rgba(239,68,68,.1)',border:'rgba(239,68,68,.25)',icon:'&#128308;'},
    andamento:{label:'Em Andamento',color:'#f59e0b',bg:'rgba(245,158,11,.1)',border:'rgba(245,158,11,.25)',icon:'&#128992;'},
    finalizado:{label:'Finalizado',color:'#10b981',bg:'rgba(16,185,129,.1)',border:'rgba(16,185,129,.25)',icon:'&#128994;'}
  };
  var tipoCfg={multa:'&#128664; Multa',ipva:'&#128203; IPVA',detran:'&#127981; DETRAN',recall:'&#128736; Recall',debito:'&#128184; Debito',outros:'&#128196; Outros'};

  var h='<div style="display:flex;flex-direction:column;gap:10px">';
  filtradas.forEach(function(c){
    var sc=statusCfg[c.status]||{label:c.status,color:'#888',bg:'var(--bg)',border:'var(--border)',icon:'&#128203;'};
    var tc=tipoCfg[c.tipo]||c.tipo||'-';
    h+='<div style="background:var(--surface);border:1px solid var(--border);border-left:4px solid '+sc.color+';border-radius:12px;padding:14px 16px">';

    // Linha 1: numero + veiculo + status
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;flex-wrap:wrap;gap:8px">';
    h+='<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
    if(c.numeroChamado)h+='<span style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--gold)">#'+c.numeroChamado+'</span>';
    h+='<div>';
    h+='<div style="font-weight:700;font-size:13px">'+(c.veiculo||'Veiculo nao informado')+'</div>';
    h+='<div style="font-size:11px;color:var(--cyan);font-weight:600">'+(c.placa||'')+'</div>';
    h+='</div></div>';
    h+='<div style="display:flex;align-items:center;gap:8px">';
    h+='<span style="background:'+sc.bg+';border:1px solid '+sc.border+';border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:'+sc.color+'">'+sc.icon+' '+sc.label+'</span>';
    h+='</div></div>';

    // Linha 2: tipo + descricao + valor
    h+='<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px">';
    h+='<div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">TIPO</div><div style="font-size:12px">'+tc+'</div></div>';
    if(c.valor)h+='<div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">VALOR</div><div style="font-size:12px;font-weight:700;color:#EF4444">'+fmtCur(c.valor)+'</div></div>';
    h+='<div style="flex:1"><div style="font-size:10px;color:var(--muted);margin-bottom:2px">DESCRICAO</div><div style="font-size:12px">'+(c.descricao||'-')+'</div></div>';
    h+='<div><div style="font-size:10px;color:var(--muted);margin-bottom:2px">ABERTURA</div><div style="font-size:12px">'+fmtDate(c.dataAbertura)+'</div></div>';
    h+='</div>';

    // Obs
    if(c.obs)h+='<div style="background:var(--bg);border-radius:8px;padding:8px 12px;font-size:11px;color:var(--sub);margin-bottom:10px">&#128221; '+c.obs+'</div>';

    // Dias desde abertura
    var _dias=c.dataAbertura?Math.floor((Date.now()-new Date(c.dataAbertura).getTime())/86400000):0;
    // Pipeline de etapas clicavel
    var _etapas=[{id:'aberto',label:'Aberto',color:'#EF4444',bg:'rgba(239,68,68,.12)',border:'rgba(239,68,68,.3)',icon:'&#128308;'},{id:'andamento',label:'Em Andamento',color:'#f59e0b',bg:'rgba(245,158,11,.12)',border:'rgba(245,158,11,.3)',icon:'&#128992;'},{id:'finalizado',label:'Finalizado',color:'#10b981',bg:'rgba(16,185,129,.12)',border:'rgba(16,185,129,.3)',icon:'&#128994;'}];
    var _idxAtual=_etapas.findIndex(function(e){return e.id===c.status;});
    h+='<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:8px;padding-top:10px;border-top:1px solid var(--border)">';
    // Etapas
    h+='<div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">';
    _etapas.forEach(function(et,i){
      var isAtual=c.status===et.id;
      var jaPasou=i<_idxAtual;
      var bg=isAtual?et.bg:(jaPasou?'rgba(255,255,255,.04)':'transparent');
      var cor=isAtual?et.color:(jaPasou?'var(--sub)':'var(--border)');
      var bord=isAtual?et.border:(jaPasou?'rgba(255,255,255,.15)':'var(--border)');
      var fw=isAtual?'700':'400';
      h+='<button onclick="mudarStatusChamado(\''+c.id+'\',\''+et.id+'\')" style="background:'+bg+';border:1px solid '+bord+';border-radius:20px;padding:4px 12px;color:'+cor+';font-size:11px;cursor:pointer;font-weight:'+fw+'">'+et.icon+' '+et.label+'</button>';
      if(i<_etapas.length-1)h+='<span style="color:var(--border);font-size:11px">&#8250;</span>';
    });
    h+='</div>';
    // Dias + botoes
    h+='<div style="display:flex;align-items:center;gap:6px">';
    h+='<span style="background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:'+(_dias>30?'#EF4444':_dias>7?'#f59e0b':'var(--muted)')+';font-weight:600">&#128337; '+_dias+'d</span>';
    h+='<button onclick="openChamadoModal(\''+c.id+'\')" style="background:var(--border);border:none;border-radius:8px;padding:5px 10px;color:var(--sub);font-size:11px;cursor:pointer" title="Editar">&#9998;</button>';
    h+='<button onclick="deleteChamado(\''+c.id+'\')" style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:8px;padding:5px 10px;color:#EF4444;font-size:11px;cursor:pointer" title="Excluir">&#10005;</button>';
    h+='</div></div></div>';
  });
  h+='</div>';
  return h;
}
function reRenderCham(){
  var q=(document.getElementById('chamSearch')||{}).value||'';
  var el=document.getElementById('chamLista');
  if(el)el.innerHTML=buildChamLista(chamados,q);
}

function openChamadoModal(id){
  var c=id?(chamados.find(function(x){return x.id===id;})||{}):{status:'aberto',dataAbertura:today()};
  // Opcoes de placa das vendas
  var placas=['<option value="">- Selecione a Placa -</option>'];
  sales.forEach(function(s){
    if(s.plate)placas.push('<option value="'+s.plate+'"'+(c.placa===s.plate?' selected':'')+' data-v="'+(s.vehicle||'')+' '+(s.year||'')+'">'+(s.plate)+' — '+(s.vehicle||'')+'</option>');
  });
  // Placa manual se nao estiver nas vendas
  placas.push('<option value="manual"'+(c.placa&&!sales.find(function(s){return s.plate===c.placa;})?'selected':'')+'>+ Outra placa (digitar)</option>');

  showModal((id?'Editar':'Novo')+' Chamado',
    '<div class="form-grid">'+
    '<div class="field"><label>Placa do Veiculo</label>'+
    '<select id="cham_placa" onchange="preencherVeiculoChamado()">'+placas.join('')+'</select></div>'+
    '<div class="field" id="cham_placa_manual_wrap" style="display:'+(c.placa&&!sales.find(function(s){return s.plate===c.placa;})?'block':'none')+'">'+
    '<label>Placa (manual)</label><input id="cham_placa_manual" value="'+(c.placa&&!sales.find(function(s){return s.plate===c.placa;})?c.placa:'')+'" placeholder="Ex: ABC1234" style="text-transform:uppercase"></div>'+
    '<div class="field"><label>Veiculo</label><input id="cham_veiculo" value="'+(c.veiculo||'')+'" placeholder="Preenchido automatico pela placa"></div>'+
    '<div class="field"><label>Numero do Chamado / Protocolo</label><input id="cham_num" value="'+(c.numeroChamado||'')+'" placeholder="Ex: 2026-001234"></div>'+
    '<div class="field"><label>Tipo</label><select id="cham_tipo"><option value="multa"'+(c.tipo==='multa'?' selected':'')+'>&#128664; Multa</option><option value="ipva"'+(c.tipo==='ipva'?' selected':'')+'>&#128203; IPVA</option><option value="detran"'+(c.tipo==='detran'?' selected':'')+'>&#127981; DETRAN</option><option value="recall"'+(c.tipo==='recall'?' selected':'')+'>&#128736; Recall</option><option value="debito"'+(c.tipo==='debito'?' selected':'')+'>&#128184; Debito</option><option value="outros"'+(c.tipo==='outros'?' selected':'')+'>&#128196; Outros</option></select></div>'+
    '<div class="field"><label>Valor (R$)</label><input id="cham_valor" type="number" step="0.01" value="'+(c.valor||'')+'"></div>'+
    '<div class="field"><label>Data de Abertura</label><input id="cham_data" type="date" value="'+(c.dataAbertura||today())+'"></div>'+
    '<div class="field"><label>Status</label><select id="cham_status"><option value="aberto"'+(c.status==='aberto'?' selected':'')+'>&#128308; Aberto</option><option value="andamento"'+(c.status==='andamento'?' selected':'')+'>&#128992; Em Andamento</option><option value="finalizado"'+(c.status==='finalizado'?' selected':'')+'>&#128994; Finalizado</option></select></div>'+
    '<div class="field" style="grid-column:1/-1"><label>Descricao</label><input id="cham_desc" value="'+(c.descricao||'')+'" placeholder="Ex: Auto de infracao - excesso de velocidade R$ 293"></div>'+
    '<div class="field" style="grid-column:1/-1"><label>Observacoes</label><input id="cham_obs" value="'+(c.obs||'')+'" placeholder="Ex: Enviado para despachante resolver"></div>'+
    '</div>',
    function(){
      var sel=document.getElementById('cham_placa');
      var isManual=sel&&sel.value==='manual';
      var placa=isManual?((document.getElementById('cham_placa_manual')||{}).value||'').toUpperCase().trim():((sel||{}).value||'').trim();
      if(!placa||placa==='manual'){notify('Selecione ou informe a placa','err');return;}
      var data={
        placa:placa,
        veiculo:gv('cham_veiculo'),
        numeroChamado:gv('cham_num'),
        tipo:gv('cham_tipo'),
        valor:Number(gv('cham_valor')||0),
        dataAbertura:gv('cham_data')||today(),
        status:gv('cham_status')||'aberto',
        descricao:gv('cham_desc'),
        obs:gv('cham_obs'),
        updatedAt:today()
      };
      if(id){
        db.collection('chamados').doc(id).update(data).then(function(){notify('Chamado atualizado!');closeModal();}).catch(function(e){notify('Erro: '+e.message,'err');});
      }else{
        data.createdAt=today();
        db.collection('chamados').add(data).then(function(){notify('Chamado criado!');closeModal();}).catch(function(e){notify('Erro: '+e.message,'err');});
      }
    },
    'Salvar Chamado'
  );
  // Preencher veiculo se placa ja selecionada
  setTimeout(preencherVeiculoChamado,100);
}

function preencherVeiculoChamado(){
  var sel=document.getElementById('cham_placa');
  var wrap=document.getElementById('cham_placa_manual_wrap');
  var veic=document.getElementById('cham_veiculo');
  if(!sel)return;
  if(sel.value==='manual'){
    if(wrap)wrap.style.display='block';
    return;
  }
  if(wrap)wrap.style.display='none';
  // Puxar veiculo da venda pela placa
  var venda=sales.find(function(s){return s.plate===sel.value;});
  if(venda&&veic)veic.value=(venda.vehicle||'')+(venda.year?' '+venda.year:'');
}

function mudarStatusChamado(id,novoStatus){
  db.collection('chamados').doc(id).update({status:novoStatus,updatedAt:today()}).then(function(){
    var labels={aberto:'Aberto',andamento:'Em Andamento',finalizado:'Finalizado'};
    notify('Status: '+labels[novoStatus]);
  }).catch(function(e){notify('Erro: '+e.message,'err');});
}

function deleteChamado(id){
  confirmDlg('Excluir Chamado','Tem certeza que deseja excluir este chamado?',function(){
    db.collection('chamados').doc(id).delete().then(function(){notify('Chamado removido','err');}).catch(function(e){notify('Erro: '+e.message,'err');});
  });
}

// ── MESSAGES ─────────────────────────────
function renderMessages(){
  var convs=clients.map(function(c){return {client:c,msgs:messages.filter(function(m){return m.clientId==c.id;}).sort(function(a,b){return a.date.localeCompare(b.date);}),unread:messages.filter(function(m){return m.clientId==c.id&&!m.read&&m.direction==='received';}).length};}).filter(function(cv){return cv.msgs.length>0;});
  var selMsgs=selectedConv?messages.filter(function(m){return m.clientId==selectedConv;}).sort(function(a,b){return a.date.localeCompare(b.date);}):[];
  var selCl=selectedConv?getClient(selectedConv):null;
  var qr=['Pagamento confirmado','Documentos enviados','Veiculo pronto','Prazo: 4 dias uteis','Ola! Como posso ajudar?'];
  var convHtml=convs.map(function(cv){return '<div class="conv-item '+(selectedConv==cv.client.id?'active':'')+'" onclick="selectConv(\''+cv.client.id+'\')"><div class="conv-name">'+cv.client.name+(cv.unread>0?'<span class="badge">'+cv.unread+'</span>':'')+'</div><div class="conv-preview">'+(cv.msgs[cv.msgs.length-1]?cv.msgs[cv.msgs.length-1].text:'')+'</div></div>';}).join('');
  var chatHtml=selectedConv?
    '<div style="padding:10px 14px;border-bottom:1px solid var(--border);background:var(--gold-dim);display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;font-size:13px;color:var(--gold)">'+(selCl?selCl.name:'')+'</div><div style="font-size:11px;color:var(--sub)">'+(selCl?selCl.phone:'')+'</div></div>'+(selCl&&selCl.phone?'<a href="https://wa.me/55'+((selCl.phone||'').replace(/\D/g,''))+'" target="_blank"><button class="btn btn-sm" style="background:rgba(37,211,102,.15);color:#25D366;border:1px solid rgba(37,211,102,.3)">WhatsApp</button></a>':'')+'</div>'+
    '<div style="padding:6px 10px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap">'+qr.map(function(q){return '<button onclick="document.getElementById(\'chatInput\').value=\''+q+'\'" style="background:var(--gold-dim);border:1px solid rgba(201,168,76,.2);color:var(--gold);border-radius:99px;padding:2px 9px;cursor:pointer;font-size:10px">'+q+'</button>';}).join('')+'</div>'+
    '<div class="chat-messages" id="chatMsgs">'+selMsgs.map(function(m){return '<div class="msg-bubble '+(m.direction==='sent'?'msg-sent':'msg-recv')+'"><div>'+m.text+'</div><div class="msg-time">'+m.date+'</div></div>';}).join('')+'</div>'+
    '<div class="chat-input"><input id="chatInput" placeholder="Escrever..." style="flex:1" onkeydown="if(event.key===\'Enter\')sendMsg()"><button class="btn btn-primary" onclick="sendMsg()">Enviar</button></div>'
    :'<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);height:100%;gap:10px"><div style="font-size:40px;opacity:.3">?</div><div>Selecione uma conversa</div></div>';
  return '<div class="msg-layout"><div class="msg-list"><div style="padding:10px 12px;border-bottom:1px solid var(--border);font-weight:700;font-size:12px;color:var(--gold)">Conversas</div><div style="padding:8px;border-bottom:1px solid var(--border)"><select id="newMsgClient" style="width:100%;margin-bottom:5px;font-size:10px"><option value="">Cliente...</option>'+clients.map(function(c){return '<option value="'+c.id+'">'+c.name+'</option>';}).join('')+'</select><input id="newMsgText" placeholder="Texto..." style="width:100%;font-size:10px;margin-bottom:5px" onkeydown="if(event.key===\'Enter\')addReceivedMsg()"><button class="btn btn-primary" style="width:100%;font-size:10px;padding:5px" onclick="addReceivedMsg()">+ Registrar</button></div>'+convHtml+(convs.length===0?'<div style="padding:14px;color:var(--muted);font-size:12px">Nenhuma conversa</div>':'')+'</div><div class="msg-chat">'+chatHtml+'</div></div>';
}
function selectConv(cid){selectedConv=cid;messages.filter(function(m){return m.clientId==cid&&!m.read&&m.direction==='received';}).forEach(function(m){db.collection('messages').doc(m.id).update({read:true});});buildNav();render();setTimeout(function(){var el=document.getElementById('chatMsgs');if(el)el.scrollTop=el.scrollHeight;},100);}
function sendMsg(){var inp=document.getElementById('chatInput');var text=inp?inp.value.trim():'';if(!text||!selectedConv)return;db.collection('messages').add({clientId:selectedConv,text:text,direction:'sent',date:new Date().toLocaleString('pt-BR'),read:true}).then(function(){if(inp)inp.value='';}).catch(function(e){notify('Erro: '+e.message,'err');});}
function addReceivedMsg(){var cidEl=document.getElementById('newMsgClient');var textEl=document.getElementById('newMsgText');var cid=cidEl?cidEl.value:'';var text=textEl?textEl.value.trim():'';if(!cid||!text){notify('Selecione cliente e escreva','err');return;}db.collection('messages').add({clientId:cid,text:text,direction:'received',date:new Date().toLocaleString('pt-BR'),read:false}).then(function(){notify('Registrada!');selectedConv=cid;if(textEl)textEl.value='';}).catch(function(e){notify('Erro: '+e.message,'err');});}

// ── MODAL ────────────────────────────────
function showModal(title,body,onSave){
  closeModal();modalSaveFn=onSave;
  var el=document.createElement('div');el.className='overlay';el.id='modalOverlay';
  el.innerHTML='<div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><span class="modal-title">'+title+'</span><button class="modal-close" onclick="closeModal()">X</button></div>'+body+'<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="modalSaveFn&&modalSaveFn()">Salvar</button></div></div>';
  el.addEventListener('click',function(e){if(e.target===el)closeModal();});
  document.body.appendChild(el);
}
function closeModal(){var el=document.getElementById('modalOverlay');if(el)el.remove();modalSaveFn=null;}

// ── INIT ─────────────────────────────────
document.getElementById('todayDate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
if(window.innerWidth<=620)document.getElementById('sidebar').classList.add('collapsed');
buildNav();
initFirebase();
</script>
</body>
