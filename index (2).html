<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TH Auto Repasse</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#0F0F0F;--surface:#1A1A1A;--border:#2A2A2A;--text:#F0EDE8;--muted:#6B6560;--sub:#9A948E;--gold:#C9A84C;--gold-light:#E2C97E;--gold-dark:#8B6914;--gold-dim:rgba(201,168,76,.14);--red:#EF4444;--red-dim:rgba(239,68,68,.12);--cyan:#4AADCA;--green:#4CAF7D;--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:20;transition:width .2s}
#sidebar.collapsed{width:0;overflow:hidden}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#content{flex:1;overflow-y:auto;padding:20px}
.brand{padding:14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.brand-icon{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#0F0F0F;flex-shrink:0}
.brand-title{font-size:11px;font-weight:800;color:var(--gold)}
.brand-sub{font-size:9px;color:var(--sub)}
nav{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-sec{font-size:9px;color:var(--gold-dark);font-weight:700;text-transform:uppercase;padding:8px 10px 4px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 8px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--sub);cursor:pointer;font-size:12px;text-align:left;width:100%;border-left:2px solid transparent;white-space:nowrap}
.nav-btn:hover{background:rgba(201,168,76,.06);color:var(--text)}
.nav-btn.active{background:var(--gold-dim);color:var(--gold);font-weight:600;border-left-color:var(--gold)}
.badge{background:var(--red);color:#fff;border-radius:99px;font-size:9px;padding:1px 5px;font-weight:700;margin-left:auto}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.card-value{font-size:18px;font-weight:800}
.card-label{font-size:10px;color:var(--muted);margin-top:2px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:9px 12px;text-align:left;color:var(--gold-dark);font-size:9px;font-weight:700;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(201,168,76,.03)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
label{font-size:10px;color:var(--gold-dark);font-weight:700;text-transform:uppercase}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;color:var(--text);font-size:12px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
select option{background:var(--surface)}
textarea{resize:vertical;min-height:60px}
.btn{padding:8px 14px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0F0F0F}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.btn-success{background:rgba(76,175,125,.15);color:#4CAF7D;border:1px solid rgba(76,175,125,.3)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-icon{padding:5px 8px;background:rgba(255,255,255,.05);border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:13px;line-height:1}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:200;padding:14px}
.modal{background:var(--surface);border:1px solid var(--gold-dark);border-radius:14px;padding:22px;width:100%;max-width:580px;max-height:92vh;overflow-y:auto}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700;color:var(--gold)}
.modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.sbadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;white-space:nowrap;display:inline-block}
.search-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap input{padding-left:30px}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
.empty{padding:36px;text-align:center;color:var(--muted);font-size:13px}
.alert-yellow{padding:10px 14px;border-radius:9px;font-size:12px;margin-bottom:14px;background:rgba(201,168,76,.1);border:1px solid var(--gold);color:var(--gold-light)}
.sale-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.sale-card.overdue{border-color:var(--red)}
.sale-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.sale-meta{font-size:10px;color:var(--sub);margin-top:3px}
.sale-info-row{padding:8px 0;border-top:1px solid var(--border);display:flex;gap:14px;flex-wrap:wrap;font-size:11px}
.dre-row{display:flex;justify-content:space-between;padding:8px 12px;border-radius:7px;font-size:13px;margin-bottom:3px}
.dre-total{font-weight:800;font-size:14px;background:rgba(201,168,76,.06);border-radius:8px;border:1px solid rgba(201,168,76,.1)}
.report-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.report-title{font-weight:700;font-size:14px;margin-bottom:14px;color:var(--gold)}
.tab-btn{padding:6px 14px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-weight:600}
.tab-btn.active{background:var(--gold-dim);color:var(--gold);border-color:var(--gold)}
.msg-layout{display:flex;gap:12px;height:calc(100vh - 140px)}
.msg-list{width:230px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:auto;flex-shrink:0;display:flex;flex-direction:column}
.msg-chat{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;min-width:0}
.conv-item{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;border-left:2px solid transparent}
.conv-item.active{background:var(--gold-dim);border-left-color:var(--gold)}
.conv-name{font-weight:600;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.conv-preview{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:7px}
.msg-bubble{max-width:72%;padding:7px 11px;border-radius:11px;font-size:12px}
.msg-sent{align-self:flex-end;background:rgba(201,168,76,.2)}
.msg-recv{align-self:flex-start;background:var(--border)}
.msg-time{font-size:9px;color:var(--muted);margin-top:2px;text-align:right}
.chat-input{padding:10px;border-top:1px solid var(--border);display:flex;gap:7px}
#notif{position:fixed;bottom:18px;right:18px;padding:10px 16px;border-radius:9px;font-weight:600;font-size:12px;z-index:999;opacity:0;pointer-events:none;max-width:300px;transition:opacity .3s}
#notif.show{opacity:1}
#notif.ok{background:#5a4309;color:#fff;border:1px solid var(--gold)}
#notif.err{background:#7F1D1D;color:#FCA5A5;border:1px solid var(--red)}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;z-index:300}
.confirm-box{background:var(--surface);border:1px solid var(--red);border-radius:14px;padding:24px;max-width:360px;width:90%;text-align:center}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.cat-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.fin-entrada{color:#4CAF7D;font-weight:700}
.fin-saida{color:#EF4444;font-weight:700}
.mes-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
/* Pipeline Vendas */
.pipeline-wrap{display:flex;align-items:flex-start;gap:0;margin:10px 0 6px;overflow-x:auto;padding-bottom:2px}
.pip-step{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:68px}
.pip-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;border:2px solid;flex-shrink:0;transition:all .2s}
.pip-dot.pip-done{opacity:.55}
.pip-dot.pip-current{box-shadow:0 0 10px rgba(255,255,255,.25)}
.pip-dot.pip-pending{opacity:.2;background:transparent!important}
.pip-label{font-size:9px;text-align:center;line-height:1.2;max-width:64px;font-weight:600}
.pip-date{font-size:8px;color:var(--muted);text-align:center}
.pip-arrow{font-size:11px;color:#333;margin:0 1px;padding-top:6px;flex-shrink:0}
.pip-prazo{font-size:8px;font-weight:700;text-align:center}
.sale-card.pip-overdue{border-color:var(--red)!important;box-shadow:0 0 14px rgba(239,68,68,.2)}
.btn-pip{padding:5px 11px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-weight:700;font-size:11px;display:inline-flex;align-items:center;gap:4px;transition:opacity .15s}
.btn-pip:hover{opacity:.85}
@media(max-width:620px){#sidebar{position:fixed;height:100vh}.form-grid{grid-template-columns:1fr}.card-grid{grid-template-columns:repeat(2,1fr)}.msg-layout{flex-direction:column;height:auto}.msg-list{width:100%;height:180px}.msg-chat{height:400px}}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <div class="brand-icon">TH</div>
      <div>
        <div class="brand-title">TH AUTO REPASSE</div>
        <div class="brand-sub" id="syncStatus">Conectando...</div>
      </div>
    </div>
    <nav id="nav"></nav>
  </aside>
  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px">&#9776;</button>
        <span id="pageTitle" style="font-weight:700;font-size:15px;color:var(--gold)"></span>
      </div>
      <span id="todayDate" style="font-size:11px;color:var(--muted)"></span>
    </div>
    <div id="content">
      <div id="loadingScreen" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--muted)">
        <div class="spinner"></div><span>Conectando...</span>
      </div>
    </div>
  </div>
</div>
<div id="notif"></div>

<script>
var db = null;
var clients=[], sales=[], messages=[], expenses=[], categories=[], financeiro=[];
var loadedCount=0;
var currentTab='dashboard', selectedConv=null, repTab='geral', dreMonth=null, finTab='lancamentos';
var modalSaveFn=null;

var STATUS_MAP={
  aguardando_boleto:{label:'Aguard. Boleto',color:'#94a3b8'},
  boleto_enviado:{label:'Boleto Enviado',color:'#f59e0b'},
  boleto_pago:{label:'Boleto Pago',color:'#10b981'},
  aguardando_liberacao:{label:'Aguard. Liberacao',color:'#4A90D9'},
  carro_liberado:{label:'Carro Liberado',color:'#8b5cf6'},
  cancelada:{label:'Cancelada',color:'#EF4444'}
};
// Ordem das etapas do pipeline
var PIPELINE=['aguardando_boleto','boleto_enviado','boleto_pago','aguardando_liberacao','carro_liberado'];
// Prazos em dias por etapa
var PRAZOS={aguardando_boleto:1,boleto_enviado:2,boleto_pago:1,aguardando_liberacao:3,carro_liberado:null};
// Etapas que contam no financeiro (a partir de boleto_pago)
var ETAPAS_FINANCEIRO=['boleto_pago','aguardando_liberacao','carro_liberado'];
// Categorias do financeiro que NAO entram no DRE (ja contabilizadas nas vendas)
var CATS_DRE_EXCLUIR=['venda','compra veiculo','compra','transferencia','retirada de socio','retirada socio','retirada'];
function finDRE(f){var cat=(f.categoria||f.descricao||'').toLowerCase().trim();return CATS_DRE_EXCLUIR.indexOf(cat)<0;}
var BR_STATES=['AC','AL','AP','AM','BA','CE','DF','ES','GO','MA','MT','MS','MG','PA','PB','PR','PE','PI','RJ','RN','RS','RO','RR','SC','SP','SE','TO'];

function liberarApp(){
  document.getElementById('syncStatus').textContent='Online';
  var ls=document.getElementById('loadingScreen');
  if(ls)ls.style.display='none';
  limparLancamentosAutomaticos();
  migrarVendasAntigas();
  goTo('dashboard');
}
function onLoaded(){
  loadedCount++;
  if(loadedCount>=6){
    clearTimeout(window._connectTimeout);
    liberarApp();
  }
}
function initFirebase(){
  try{
    firebase.initializeApp({
      apiKey:"AIzaSyBHcpM_BMzo6y98HvlFXwhAwV4Ot5-1gm8",
      authDomain:"th-auto-repasse.firebaseapp.com",
      projectId:"th-auto-repasse",
      storageBucket:"th-auto-repasse.firebasestorage.app",
      messagingSenderId:"227004517822",
      appId:"1:227004517822:web:132ea3f2c140ccfc85bdef"
    });
  }catch(e){console.log('Firebase ja iniciado');}
  db=firebase.firestore();

  // Timeout de seguranca: 6s sem conectar -> libera mesmo assim
  window._connectTimeout=setTimeout(function(){
    console.warn('Timeout Firebase: '+loadedCount+'/6 colecoes carregadas');
    document.getElementById('syncStatus').textContent=(loadedCount>0?'Parcial':'Offline');
    var ls=document.getElementById('loadingScreen');
    if(ls)ls.style.display='none';
    goTo('dashboard');
  },6000);

  function snap(col,cb){
    db.collection(col).onSnapshot(
      function(s){cb(s);},
      function(e){console.error('Erro '+col+':',e.message);onLoaded();}
    );
  }
  snap('clients',  function(s){clients=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});onLoaded();if(currentTab==='clients')render();buildNav();});
  snap('sales',    function(s){sales=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});onLoaded();if(['sales','dashboard','docs'].indexOf(currentTab)>=0)render();});
  snap('messages', function(s){messages=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});onLoaded();if(currentTab==='messages')render();buildNav();});
  snap('expenses', function(s){expenses=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});onLoaded();if(['expenses','dre','reports','financeiro'].indexOf(currentTab)>=0)render();});
  snap('categories',function(s){categories=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});if(!categories.length)seedCategories();onLoaded();if(currentTab==='categories')render();});
  snap('financeiro',function(s){financeiro=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});onLoaded();if(['financeiro','dre','dashboard'].indexOf(currentTab)>=0)render();});
}
// Migra vendas antigas (sem historico ou com status do sistema antigo) para o novo pipeline
var STATUS_LEGADO={'aguardando_pagamento':'aguardando_boleto','pagamento_confirmado':'boleto_pago','em_processo':'aguardando_liberacao','liberado':'aguardando_liberacao','concluida':'carro_liberado'};
function limparLancamentosAutomaticos(){
  // Deleta lancamentos gerados automaticamente pelo sistema antigo
  db.collection('financeiro').where('obs','==','Gerado automaticamente ao marcar boleto como pago').get().then(function(snap){
    if(snap.empty)return;
    snap.forEach(function(d){d.ref.delete();});
    console.log('Removidos '+snap.size+' lancamentos automaticos do financeiro');
  }).catch(function(){});
}
function migrarVendasAntigas(){
  sales.forEach(function(s){
    var precisaMigrar=false;
    var novoStatus=s.status;
    if(STATUS_LEGADO[s.status]){novoStatus=STATUS_LEGADO[s.status];precisaMigrar=true;}
    if(!s.historico||typeof s.historico!=='object'){precisaMigrar=true;}
    if(!precisaMigrar)return;
    var hist=(s.historico&&typeof s.historico==='object')?Object.assign({},s.historico):{};
    if(!hist[novoStatus])hist[novoStatus]=new Date(s.createdAt||Date.now()).toISOString();
    db.collection('sales').doc(s.id).update({status:novoStatus,historico:hist}).catch(function(){});
  });
}
function seedCategories(){
  [{key:'documentacao',label:'Documentacao'},{key:'preparacao',label:'Preparacao/Mecanica'},{key:'marketing',label:'Marketing'},{key:'fixo',label:'Custo Fixo'},{key:'comissao',label:'Comissao'},{key:'retirada de socio',label:'Retirada de Socio'},{key:'transferencia',label:'Transferencia'},{key:'outros',label:'Outros'}].forEach(function(c){db.collection('categories').add(c);});
}

// HELPERS
function today(){return new Date().toISOString().split('T')[0];}
function fmtCur(v){return 'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2});}
function fmtDate(d){if(!d)return '-';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function addDays(d,n){if(!d)return null;var dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}
function daysLeft(d){if(!d)return null;return Math.ceil((new Date(d+'T12:00:00')-new Date())/86400000);}
function getClient(id){return clients.find(function(c){return c.id==id;})||{};}
function monthKey(d){return d?d.slice(0,7):'';}
function getCatLabel(key){var c=categories.find(function(x){return x.key===key;});return c?c.label:key;}
function gv(id){var e=document.getElementById(id);return e?e.value:'';}
function gn(id){return Number(gv(id))||0;}

function sbadge(s){
  var st=STATUS_MAP[s]||{label:s,color:'#888'};
  return '<span class="sbadge" style="background:'+st.color+'22;color:'+st.color+';border:1px solid '+st.color+'44">'+st.label+'</span>';
}
function prazoHtml(date,label){
  var d=daysLeft(date);
  var color=d===null?'var(--muted)':d<0?'#EF4444':d<=1?'var(--gold)':'var(--sub)';
  var text=d===null?'-':d<0?'Vencido '+Math.abs(d)+'d':d===0?'Hoje!':d+'d rest.';
  return '<span style="font-size:10px;font-weight:600;color:'+color+'">'+(label?label+': ':'')+text+' ('+fmtDate(date)+')</span>';
}
function notify(msg,type){
  var el=document.getElementById('notif');
  el.textContent=(type==='err'?'X ':'OK ')+msg;
  el.className='show '+(type||'ok');
  setTimeout(function(){el.className='';},3500);
}
function confirmDlg(title,msg,fn){
  var div=document.createElement('div');div.className='confirm-overlay';div.id='confirmOverlay';
  div.innerHTML='<div class="confirm-box"><h3 style="color:var(--red);margin-bottom:8px">'+title+'</h3><p style="color:var(--sub);font-size:13px;margin-bottom:18px">'+msg+'</p><div style="display:flex;gap:10px;justify-content:center"><button class="btn btn-secondary" onclick="document.getElementById(\'confirmOverlay\').remove()">Cancelar</button><button class="btn btn-danger" id="confirmYes">Excluir</button></div></div>';
  document.body.appendChild(div);
  document.getElementById('confirmYes').onclick=function(){div.remove();fn();};
}

// CALC HELPERS
function getAllMonths(){
  var all=[];
  sales.forEach(function(s){var m=monthKey(s.saleDate||s.createdAt);if(m&&all.indexOf(m)<0)all.push(m);});
  expenses.forEach(function(e){var m=monthKey(e.date);if(m&&all.indexOf(m)<0)all.push(m);});
  financeiro.forEach(function(f){var m=monthKey(f.date);if(m&&all.indexOf(m)<0)all.push(m);});
  return all.sort();
}
function calcMonth(m){
  var mSales=sales.filter(function(s){return monthKey(s.saleDate||s.createdAt)===m&&ETAPAS_FINANCEIRO.indexOf(s.status)>=0;});
  var receita=mSales.reduce(function(a,s){return a+Number(s.value||0);},0);
  var cmv=mSales.reduce(function(a,s){return a+Number(s.cost||0)+Number(s.channelValue||0);},0);
  // Custos extras por veiculo (despachante, transferencia, multas etc)
  var custosExtras=mSales.reduce(function(a,s){return a+Number(s.despachante||0)+Number(s.transferencia||0)+Number(s.multas||0)+Number(s.vistoria||0)+Number(s.comissao||0)+Number(s.frete||0)+Number(s.txCanal||0)+Number(s.outros||0);},0);
  var gastosMes=expenses.filter(function(e){return monthKey(e.date)===m;}).reduce(function(a,e){return a+Number(e.value||0);},0);
  var finEnt=financeiro.filter(function(f){return monthKey(f.date)===m&&f.tipo==='entrada'&&finDRE(f);}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var finSai=financeiro.filter(function(f){return monthKey(f.date)===m&&f.tipo==='saida'&&finDRE(f);}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  // Lucro operacional = receita - todos os custos - gastos operacionais
  var lucroBruto=receita-cmv-custosExtras;
  var lucroLiquido=lucroBruto-gastosMes;
  // Resultado final considera lancamentos extras de financeiro (nao os gerados automaticamente pelas vendas)
  var resultado=lucroLiquido+finEnt-finSai;
  return {receita:receita,cmv:cmv,custosExtras:custosExtras,gastos:gastosMes,entradas:finEnt,saidas:finSai,lucroBruto:lucroBruto,lucroLiquido:lucroLiquido,lucro:resultado,qtd:mSales.length};
}

  var cmv=done.reduce(function(a,s){return a+Number(s.cost||0)+Number(s.channelValue||0);},0);
  var custosExtrasDash=done.reduce(function(a,s){return a+Number(s.despachante||0)+Number(s.transferencia||0)+Number(s.multas||0)+Number(s.vistoria||0)+Number(s.comissao||0)+Number(s.frete||0)+Number(s.txCanal||0)+Number(s.outros||0);},0);

// ── SALES ────────────────────────────────
function diasNaEtapa(s){
  var hist=s.historico||{};
  var entrada=hist[s.status];
  if(!entrada)return 0;
  return Math.floor((Date.now()-new Date(entrada).getTime())/86400000);
}
function pipOverdue(s){
  if(s.status==='carro_liberado'||s.status==='cancelada')return false;
  var prazo=PRAZOS[s.status];
  if(!prazo)return false;
  return diasNaEtapa(s)>prazo;
}
function buildPipelineHtml(s){
  var hist=s.historico||{};
  var idxAtual=PIPELINE.indexOf(s.status);
  var h='<div class="pipeline-wrap">';
  PIPELINE.forEach(function(etId,i){
    var et=STATUS_MAP[etId];
    var feita=i<idxAtual;
    var atual=i===idxAtual;
    var pendente=i>idxAtual;
    var cls=feita?'pip-done':atual?'pip-current':'pip-pending';
    var ico=feita?'✓':atual?['⏳','📄','✅','🔓','🚗'][i]:'·';
    var prazo=PRAZOS[etId];
    var dias=atual?diasNaEtapa(s):null;
    var atrasado=atual&&prazo&&dias>prazo;
    var prazoTxt=atual&&prazo?(atrasado?'<span style="color:#EF4444">+'+dias+'d/'+prazo+'d</span>':'<span style="color:var(--sub)">'+dias+'d/'+prazo+'d</span>'):'';
    var dataEnt=hist[etId]?new Date(hist[etId]).toLocaleDateString('pt-BR'):'';
    h+='<div class="pip-step">';
    h+='<div class="pip-dot '+cls+'" style="color:'+et.color+';border-color:'+et.color+';background:'+et.color+(feita?'44':atual?'22':'11')+'">'+ico+'</div>';
    h+='<div class="pip-label" style="color:'+(atual?et.color:feita?'var(--sub)':'var(--muted)')+'">'+et.label+'</div>';
    if(dataEnt)h+='<div class="pip-date">'+dataEnt+'</div>';
    if(prazoTxt)h+='<div class="pip-prazo">'+prazoTxt+'</div>';
    h+='</div>';
    if(i<PIPELINE.length-1)h+='<div class="pip-arrow">›</div>';
  });
  h+='</div>';
  return h;
}
function renderSales(){
  var opts='<option value="todos">Todos</option>'+PIPELINE.map(function(k){return '<option value="'+k+'">'+STATUS_MAP[k].label+'</option>';}).join('')+'<option value="cancelada">Cancelada</option>';
  var atrasadas=sales.filter(pipOverdue).length;
  var avisoAtrasadas=atrasadas>0?'<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:9px;padding:8px 14px;font-size:12px;color:#FCA5A5;margin-bottom:12px">⚠ <strong>'+atrasadas+' venda(s)</strong> com etapa vencida!</div>':'';
  return '<div class="search-row"><div class="search-wrap"><span class="search-icon">🔍</span><input id="sSearch" placeholder="Veiculo, placa, cliente..." oninput="reRenderSales()"></div><select id="sFilter" onchange="reRenderSales()" style="min-width:170px">'+opts+'</select><button class="btn btn-primary" onclick="openSaleModal(null)">+ Nova Venda</button></div>'+avisoAtrasadas+'<div id="salesCards">'+buildSalesCards('','todos')+'</div>';
}
function reRenderSales(){
  var q=(document.getElementById('sSearch')||{}).value||'';
  var f=(document.getElementById('sFilter')||{}).value||'todos';
  var el=document.getElementById('salesCards');if(el)el.innerHTML=buildSalesCards(q,f);
}
function buildSalesCards(q,fs){
  var f=sales.filter(function(s){var cl=getClient(s.clientId);return ((s.vehicle||'')+(s.plate||'')+(cl.name||'')).toLowerCase().indexOf(q.toLowerCase())>=0&&(fs==='todos'||s.status===fs);});
  // ordenar: atrasadas primeiro, depois por etapa
  f.sort(function(a,b){var oa=pipOverdue(a)?0:1,ob=pipOverdue(b)?0:1;if(oa!==ob)return oa-ob;return PIPELINE.indexOf(a.status)-PIPELINE.indexOf(b.status);});
  if(!f.length)return '<div class="empty">Nenhuma venda</div>';
  return f.map(function(s){
    var cl=getClient(s.clientId);
    var overdue=pipOverdue(s);
    var sExp=expenses.filter(function(e){return e.plate===s.plate;}).reduce(function(a,e){return a+Number(e.value||0);},0);
    var custosExtras=Number(s.channelValue||0)+Number(s.despachante||0)+Number(s.transferencia||0)+Number(s.multas||0)+Number(s.vistoria||0)+Number(s.comissao||0)+Number(s.frete||0)+Number(s.txCanal||0)+Number(s.outros||0);
    var lucro=Number(s.value||0)-Number(s.cost||0)-custosExtras-sExp;
    var idxAtual=PIPELINE.indexOf(s.status);

function avancarEtapa(id){
  var s=sales.find(function(x){return x.id===id;});if(!s)return;
  var idx=PIPELINE.indexOf(s.status);
  if(idx<0||idx>=PIPELINE.length-1)return;
  var novaEtapa=PIPELINE[idx+1];
  // Usar dot notation para o Firestore aceitar campo aninhado
  var histKey='historico.'+novaEtapa;
  var upd={status:novaEtapa};
  upd[histKey]=new Date().toISOString();
  // Lançamento financeiro é feito manualmente - nao criar automatico
  db.collection('sales').doc(id).update(upd).then(function(){notify('Avancado para: '+(STATUS_MAP[novaEtapa]||{label:novaEtapa}).label);}).catch(function(e){notify('Erro: '+e.message,'err');});
}
function voltarEtapa(id){
  var s=sales.find(function(x){return x.id===id;});if(!s)return;
  var idx=PIPELINE.indexOf(s.status);
  if(idx<=0)return;
  var etapaAnterior=PIPELINE[idx-1];
  var upd={status:etapaAnterior};
  upd['historico.'+s.status]=firebase.firestore.FieldValue.delete();
  // Sem lancamento automatico para remover
  db.collection('sales').doc(id).update(upd).then(function(){notify('Voltado para: '+(STATUS_MAP[etapaAnterior]||{label:etapaAnterior}).label);}).catch(function(e){notify('Erro: '+e.message,'err');});
}

  if(id){db.collection('sales').doc(id).update(data).then(function(){notify('Atualizada!');closeModal();}).catch(function(e){notify('Erro: '+e.message,'err');});}

function saveExpense(id){
  var desc=gv('eg_d').trim(),value=gv('eg_v'),date=gv('eg_dt');
  if(!desc||!value||!date){notify('Preencha descricao, valor e data','err');return;}
  var data={desc:desc,value:Number(value),category:gv('eg_c'),date:date,plate:gv('eg_p'),notes:gv('eg_n')};
  if(id){
    // atualiza gasto
    db.collection('expenses').doc(id).update(data).then(function(){
      // atualiza lancamento financeiro vinculado se existir
      db.collection('financeiro').where('expenseId','==',id).get().then(function(snap){
        snap.forEach(function(doc){
          db.collection('financeiro').doc(doc.id).update({
            descricao:desc,valor:Number(value),date:date,plate:gv('eg_p'),categoria:getCatLabel(gv('eg_c'))
          });
        });
      });
      notify('Gasto atualizado!');closeModal();
    }).catch(function(e){notify('Erro: '+e.message,'err');});
  }else{
    db.collection('expenses').add(data).then(function(ref){
      // cria automaticamente saida no financeiro
      db.collection('financeiro').add({
        tipo:'saida',
        descricao:desc,
        valor:Number(value),
        date:date,
        plate:gv('eg_p'),
        categoria:getCatLabel(gv('eg_c')),
        obs:'Lancado automaticamente via Gastos',
        expenseId:ref.id
      });
      notify('Gasto registrado e lancado no Financeiro!');closeModal();
    }).catch(function(e){notify('Erro: '+e.message,'err');});
  }
}
function deleteExpense(id){
  confirmDlg('Excluir Gasto','Isso tambem remove o lancamento no Financeiro. Tem certeza?',function(){
    db.collection('expenses').doc(id).delete().then(function(){
      // remove lancamento financeiro vinculado
      db.collection('financeiro').where('expenseId','==',id).get().then(function(snap){
        snap.forEach(function(doc){db.collection('financeiro').doc(doc.id).delete();});
      });
      notify('Gasto e lancamento removidos','err');
    }).catch(function(e){notify('Erro: '+e.message,'err');});
  });
}

function lerCSV(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var text=e.target.result;
    processarCSV(text);
  };
  reader.readAsText(file,'UTF-8');
}

function processarCSV(text){
  text=text.replace(/^\uFEFF/,'');
  var lines=text.split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2){
    document.getElementById('importPreviewArea').innerHTML='<div style="color:var(--red);padding:10px;background:rgba(239,68,68,.1);border-radius:8px">Arquivo vazio ou invalido.</div>';
    return;
  }
  function parseCSVLine(line){
    var cols=[],cur='',inQuote=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(ch==='"'){inQuote=!inQuote;}
      else if((ch===','||ch===';')&&!inQuote){cols.push(cur.trim());cur='';}
      else{cur+=ch;}
    }
    cols.push(cur.trim());
    return cols;
  }
  // normaliza texto removendo acentos e caracteres especiais
  function norm(s){
    return (s||'').toString().toLowerCase()
      .replace(/[àáâãäå]/g,'a').replace(/[èéêë]/g,'e')
      .replace(/[ìíîï]/g,'i').replace(/[òóôõö]/g,'o')
      .replace(/[ùúûü]/g,'u').replace(/[ç]/g,'c')
      .replace(/[ñ]/g,'n').replace(/[^a-z0-9 ]/g,' ').trim();
  }
  var headers=parseCSVLine(lines[0]).map(function(h){return h.replace(/"/g,'').trim();});
  var headersNorm=headers.map(function(h){return norm(h);});
  var rows=[];
  for(var i=1;i<lines.length;i++){
    var cols=parseCSVLine(lines[i]);
    if(cols.join('').trim()==='') continue;
    var obj={};
    headers.forEach(function(h,idx){
      obj[h]=(cols[idx]||'').replace(/"/g,'').trim();
      obj[norm(h)]=(cols[idx]||'').replace(/"/g,'').trim();
    });
    rows.push(obj);
  }
  if(!rows.length){
    document.getElementById('importPreviewArea').innerHTML='<div style="color:var(--red);padding:10px;background:rgba(239,68,68,.1);border-radius:8px">Nenhuma linha encontrada.</div>';
    return;
  }
  importPreview=rows.map(function(r){return mapearLinha(r,importType);}).filter(function(r){return r&&r!==null;});
  if(!importPreview.length){
    document.getElementById('importPreviewArea').innerHTML=
      '<div style="color:var(--red);padding:10px;background:rgba(239,68,68,.1);border-radius:8px;margin-bottom:8px">Nenhum dado valido encontrado.</div>'+
      '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:11px;color:var(--sub)">'+
      '<b style="color:var(--gold)">Colunas detectadas:</b><br>'+headers.join(' | ')+'<br><br>'+
      '<b style="color:var(--gold)">Linhas:</b> '+rows.length+'</div>';
    return;
  }
  mostrarPreview();
}

function limparValor(v){
  if(!v)return 0;
  // Remove R$, espacos, pontos de milhar e troca virgula por ponto
  var s=v.toString().replace(/R\$\s*/g,'').replace(/\./g,'').replace(',','.').replace(/[^0-9.]/g,'').trim();
  return Number(s)||0;
}

function mapearLinha(row,tipo){
  function find(keys){
    for(var i=0;i<keys.length;i++){
      for(var k in row){
        if(k.toLowerCase().trim().indexOf(keys[i].toLowerCase())>=0&&(row[k]||'').trim()!=='') return (row[k]||'').trim();
      }
    }
    return '';
  }

  if(tipo==='clientes'){
    var nome=find(['nome cliente','nome','name','razao']);
    if(!nome) return null;
    var cpfcnpj=find(['cpf','cnpj']);
    var isCnpj=cpfcnpj.replace(/\D/g,'').length>11;
    return {
      name:nome,
      cpf:isCnpj?'':cpfcnpj,
      cnpj:isCnpj?cpfcnpj:'',
      phone:find(['telefone','fone','celular','whatsapp','tel']),
      address:find(['endereco','endereço','rua','logradouro']),
      city:find(['cidade','city','municipio']),
      state:find(['estado','uf']),
      cep:find(['cep','zip']),
      obs:find(['obs','observ','nota']),
      createdAt:today()
    };
  }

  if(tipo==='vendas'){
    function norm2(s){
      return (s||'').toString().toLowerCase()
        .replace(/[àáâãäå]/g,'a').replace(/[èéêë]/g,'e')
        .replace(/[ìíîï]/g,'i').replace(/[òóôõö]/g,'o')
        .replace(/[ùúûü]/g,'u').replace(/[ç]/g,'c')
        .replace(/[ñ]/g,'n').replace(/[^a-z0-9 ]/g,' ').trim();
    }
    function find(keys){
      for(var i=0;i<keys.length;i++){
        for(var k in row){
          var kn=norm2(k);
          if(kn.indexOf(keys[i])>=0&&(row[k]||'').trim()!=='') return (row[k]||'').trim();
        }
      }
      return '';
    }

    // Colunas exatas do CSV:
    // Data Venda, Nome Cliente, Cpf, Placa, Veículo, Valor Venda, custo, Comissão, Tx Canal
    var nomeCliente = find(['nome cliente','nome cli','cliente','nome']);
    var veiculo     = find(['veiculo','ve culo','carro','modelo','automovel']);
    var placa       = find(['placa','plate']);
    var valorStr    = find(['valor venda','valor vend','valor']);
    var custoStr    = find(['custo']);
    var comissao    = limparValor(find(['comissao','comiss']));
    var txCanal     = limparValor(find(['tx canal','txcanal','tx']));
    var cpfcnpj     = find(['cpf','cnpj']);
    var dataVenda   = find(['data venda','data']);

    if(!veiculo && !nomeCliente) return null;

    var valor  = limparValor(valorStr);
    var custo  = limparValor(custoStr);

    // status: todas as vendas do histórico = concluida
    var status = 'concluida';

    return {
      vehicle:      veiculo,
      value:        valor,
      cost:         custo,
      channelValue: 0,
      comissao:     comissao,
      txCanal:      txCanal,
      despachante:  0,
      transferencia:0,
      multas:       0,
      vistoria:     0,
      frete:        0,
      outros:       0,
      plate:        (placa||'').toUpperCase(),
      km:           '',
      year:         '',
      status:       status,
      saleDate:     formatarData(dataVenda),
      clientName:   nomeCliente,
      notes:        cpfcnpj && cpfcnpj!=='0' ? 'CPF/CNPJ: '+cpfcnpj : '',
      docsSent:     true,
      docsReceived: true,
      createdAt:    formatarData(dataVenda)||today()
    };
  }

  if(tipo==='gastos'){
    var desc=find(['descricao','desc','historico','item','produto','servico']);
    var val=find(['valor','value','preco','total']);
    var dt=find(['data','date']);
    if(!desc||!val) return null;
    return {
      desc:desc,
      value:limparValor(val),
      date:formatarData(dt)||today(),
      category:find(['categoria','cat','tipo'])||'outros',
      plate:(find(['placa','plate'])||'').toUpperCase(),
      notes:find(['obs','observ','nota'])
    };
  }
  if(tipo==='financeiro'){
    var tipoFin=(find(['tipo'])||'').toLowerCase().trim();
    if(tipoFin.indexOf('entrada')>=0) tipoFin='entrada';
    else if(tipoFin.indexOf('saida')>=0||tipoFin.indexOf('saída')>=0) tipoFin='saida';
    else return null;
    var valFin=find(['valor']);
    var dtFin=find(['data','date']);
    if(!valFin) return null;
    var descFin=find(['descriç','descri','desc','historico','descr'])||find(['categoria','cat'])||'-';
    return {
      tipo:tipoFin,
      valor:limparValor(valFin),
      descricao:descFin,
      date:formatarData(dtFin)||today(),
      categoria:find(['categoria','cat'])||'',
      plate:(find(['placa','plate'])||'').toUpperCase(),
      formaPgto:find(['forma','pgto','pagamento']),
      obs:find(['obs','observ','nota'])
    };
  }
  return null;
}

function formatarData(d){
  if(!d)return today();
  d=d.trim();
  // formato dd/mm/yyyy
  var m1=d.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m1)return (m1[3].length===2?'20'+m1[3]:m1[3])+'-'+m1[2].padStart(2,'0')+'-'+m1[1].padStart(2,'0');
  // formato yyyy-mm-dd
  var m2=d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m2)return d;
  return today();
}

function confirmarImportacao(){
  if(!importPreview.length)return;
  var colecao=importType==='clientes'?'clients':importType==='vendas'?'sales':importType==='financeiro'?'financeiro':'expenses';
  var total=importPreview.length;
  var count=0;
  var erros=0;

  document.getElementById('importPreviewArea').innerHTML='<div style="text-align:center;padding:30px;color:var(--gold)"><div class="spinner"></div><div style="margin-top:10px">Importando '+total+' registros...</div></div>';

  // Para vendas, tenta vincular cliente pelo nome
  function salvarRegistro(r){
    if(importType==='clientes'){
      r.clienteId=clients.length+count+1;
    }
    if(importType==='vendas' && r.clientName){
      // busca cliente pelo nome (comparacao parcial)
      var nomeBusca=(r.clientName||'').toLowerCase().trim();
      var clienteEncontrado=clients.find(function(c){
        return (c.name||'').toLowerCase().trim()===nomeBusca ||
               (c.name||'').toLowerCase().indexOf(nomeBusca)>=0 ||
               nomeBusca.indexOf((c.name||'').toLowerCase())>=0;
      });
      if(clienteEncontrado){
        r.clientId=clienteEncontrado.id;
      }
      delete r.clientName;
    }
    // calcula custo total somando todos os campos extras
    if(importType==='vendas'){
      var totalCustos=Number(r.cost||0)+Number(r.despachante||0)+Number(r.transferencia||0)+Number(r.multas||0)+Number(r.vistoria||0)+Number(r.comissao||0)+Number(r.frete||0)+Number(r.txCanal||0)+Number(r.outros||0);
      r.custoTotal=totalCustos;
    }
    return db.collection(colecao).add(r);
  }

  importPreview.forEach(function(r){
    salvarRegistro(r).then(function(){
      count++;
      if(count+erros===total){
        importPreview=[];
        notify('Importacao concluida! '+count+' registros importados'+(erros>0?' ('+erros+' erros)':'')+'!');
        render();
      }
    }).catch(function(e){
      erros++;
      if(count+erros===total){
        importPreview=[];
        notify(count+' importados, '+erros+' erros','err');
        render();
      }
    });
  });
}

function addCategory(){
  var label=gv('newCatLabel').trim();
  if(!label){notify('Digite o nome','err');return;}
  var key=label.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  if(categories.find(function(c){return c.key===key;})){notify('Ja existe','err');return;}
  db.collection('categories').add({key:key,label:label}).then(function(){notify('Adicionada!');document.getElementById('newCatLabel').value='';}).catch(function(e){notify('Erro: '+e.message,'err');});
}
function deleteCategory(id){confirmDlg('Excluir Categoria','Tem certeza?',function(){db.collection('categories').doc(id).delete().then(function(){notify('Removida','err');}).catch(function(e){notify('Erro: '+e.message,'err');});});}

// ── DRE ──────────────────────────────────
function calcDRE(m){
  var mS=sales.filter(function(s){return monthKey(s.saleDate||s.createdAt)===m&&s.status!=='cancelada';});
  var done=mS.filter(function(s){return ETAPAS_FINANCEIRO.indexOf(s.status)>=0;});
  var pending=mS.filter(function(s){return ETAPAS_FINANCEIRO.indexOf(s.status)<0;});
  var mE=expenses.filter(function(e){return monthKey(e.date)===m;});
  var mF=financeiro.filter(function(f){return monthKey(f.date)===m;});
  var receita=done.reduce(function(a,s){return a+Number(s.value||0);},0);
  var cmv=done.reduce(function(a,s){return a+Number(s.cost||0)+Number(s.channelValue||0);},0);
  var custosExtras=done.reduce(function(a,s){return a+Number(s.despachante||0)+Number(s.transferencia||0)+Number(s.multas||0)+Number(s.vistoria||0)+Number(s.comissao||0)+Number(s.frete||0)+Number(s.txCanal||0)+Number(s.outros||0);},0);
  var lucBrt=receita-cmv-custosExtras;
  var despOper=mE.reduce(function(a,e){return a+Number(e.value||0);},0);
  var comissoes=mF.filter(function(f){var c=(f.categoria||'').toLowerCase();return f.tipo==='saida'&&c==='comissao';}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var despFin=mF.filter(function(f){var c=(f.categoria||'').toLowerCase();return f.tipo==='saida'&&(c==='despesa'||c==='custo fixo');}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var lucLiq=lucBrt-despOper-comissoes-despFin;
  var margem=receita>0?((lucLiq/receita)*100).toFixed(1):0;
  var cxEnt=mF.filter(function(f){return f.tipo==='entrada';}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var cxSai=mF.filter(function(f){return f.tipo==='saida';}).reduce(function(a,f){return a+Number(f.valor||0);},0);
  var saldoCx=cxEnt-cxSai;
  var aReceber=pending.reduce(function(a,s){return a+Number(s.value||0);},0);
  return {done:done,pending:pending,mE:mE,mF:mF,receita:receita,cmv:cmv,custosExtras:custosExtras,lucBrt:lucBrt,despOper:despOper,comissoes:comissoes,despFin:despFin,lucLiq:lucLiq,margem:margem,cxEnt:cxEnt,cxSai:cxSai,saldoCx:saldoCx,aReceber:aReceber};
}
function renderDRE(){
  var months=getAllMonths().reverse();
  if(!dreMonth||months.indexOf(dreMonth)<0)dreMonth=months[0]||monthKey(today());
  var mOpts=months.map(function(m){return '<option value="'+m+'"'+(m===dreMonth?' selected':'')+'>'+m+'</option>';}).join('');
  var d=calcDRE(dreMonth);
  var mF=d.mF;
  var h='<div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap">';
  h+='<select onchange="dreMonth=this.value;render()" style="min-width:150px">'+mOpts+'</select>';
  h+='<button class="btn btn-primary btn-sm" onclick="printRelatorio(\''+dreMonth+'\')">&#128438; Imprimir / PDF</button></div>';
  // Cards resumo
  h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px">';
  h+='<div class="card" style="border-left:3px solid '+(d.lucLiq>=0?'#4CAF7D':'#EF4444')+'"><div style="font-size:10px;color:var(--gold-dark);font-weight:700;margin-bottom:8px">LUCRO LIQUIDO</div><div style="font-size:22px;font-weight:800;color:'+(d.lucLiq>=0?'#4CAF7D':'#EF4444')+'">'+fmtCur(d.lucLiq)+'</div><div style="font-size:11px;color:var(--muted)">Margem: '+d.margem+'% | '+d.done.length+' vendas</div></div>';

    '<div class="chat-messages" id="chatMsgs">'+selMsgs.map(function(m){return '<div class="msg-bubble '+(m.direction==='sent'?'msg-sent':'msg-recv')+'"><div>'+m.text+'</div><div class="msg-time">'+m.date+'</div></div>';}).join('')+'</div>'+
    '<div class="chat-input"><input id="chatInput" placeholder="Escrever..." style="flex:1" onkeydown="if(event.key===\'Enter\')sendMsg()"><button class="btn btn-primary" onclick="sendMsg()">Enviar</button></div>'
    :'<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);height:100%;gap:10px"><div style="font-size:40px;opacity:.3">?</div><div>Selecione uma conversa</div></div>';
  return '<div class="msg-layout"><div class="msg-list"><div style="padding:10px 12px;border-bottom:1px solid var(--border);font-weight:700;font-size:12px;color:var(--gold)">Conversas</div><div style="padding:8px;border-bottom:1px solid var(--border)"><select id="newMsgClient" style="width:100%;margin-bottom:5px;font-size:10px"><option value="">Cliente...</option>'+clients.map(function(c){return '<option value="'+c.id+'">'+c.name+'</option>';}).join('')+'</select><input id="newMsgText" placeholder="Texto..." style="width:100%;font-size:10px;margin-bottom:5px" onkeydown="if(event.key===\'Enter\')addReceivedMsg()"><button class="btn btn-primary" style="width:100%;font-size:10px;padding:5px" onclick="addReceivedMsg()">+ Registrar</button></div>'+convHtml+(convs.length===0?'<div style="padding:14px;color:var(--muted);font-size:12px">Nenhuma conversa</div>':'')+'</div><div class="msg-chat">'+chatHtml+'</div></div>';
}
function selectConv(cid){selectedConv=cid;messages.filter(function(m){return m.clientId==cid&&!m.read&&m.direction==='received';}).forEach(function(m){db.collection('messages').doc(m.id).update({read:true});});buildNav();render();setTimeout(function(){var el=document.getElementById('chatMsgs');if(el)el.scrollTop=el.scrollHeight;},100);}
function sendMsg(){var inp=document.getElementById('chatInput');var text=inp?inp.value.trim():'';if(!text||!selectedConv)return;db.collection('messages').add({clientId:selectedConv,text:text,direction:'sent',date:new Date().toLocaleString('pt-BR'),read:true}).then(function(){if(inp)inp.value='';}).catch(function(e){notify('Erro: '+e.message,'err');});}
function addReceivedMsg(){var cidEl=document.getElementById('newMsgClient');var textEl=document.getElementById('newMsgText');var cid=cidEl?cidEl.value:'';var text=textEl?textEl.value.trim():'';if(!cid||!text){notify('Selecione cliente e escreva','err');return;}db.collection('messages').add({clientId:cid,text:text,direction:'received',date:new Date().toLocaleString('pt-BR'),read:false}).then(function(){notify('Registrada!');selectedConv=cid;if(textEl)textEl.value='';}).catch(function(e){notify('Erro: '+e.message,'err');});}

// ── MODAL ────────────────────────────────
function showModal(title,body,onSave){
  closeModal();modalSaveFn=onSave;
  var el=document.createElement('div');el.className='overlay';el.id='modalOverlay';
  el.innerHTML='<div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><span class="modal-title">'+title+'</span><button class="modal-close" onclick="closeModal()">X</button></div>'+body+'<div class="modal-footer"><button class="btn btn-secondary" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="modalSaveFn&&modalSaveFn()">Salvar</button></div></div>';
  el.addEventListener('click',function(e){if(e.target===el)closeModal();});
  document.body.appendChild(el);
}
function closeModal(){var el=document.getElementById('modalOverlay');if(el)el.remove();modalSaveFn=null;}

// ── INIT ─────────────────────────────────
document.getElementById('todayDate').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
if(window.innerWidth<=620)document.getElementById('sidebar').classList.add('collapsed');
buildNav();
initFirebase();
</script>
</body>
</html>
